<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project NP: Adelic Singularity (O1)</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --blue: #3498db; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .oracle-shell { border: 2px solid var(--neon); background: #000; width: 90%; max-width: 850px; padding: 30px; box-shadow: 0 0 50px rgba(0,255,65,0.15); }
        input { background: #111; color: var(--neon); border: 1px solid var(--neon); padding: 12px; width: 100%; box-sizing: border-box; font-size: 1.2em; text-align: center; margin: 10px 0; outline: none; }
        .manifold { display: grid; grid-template-columns: repeat(auto-fill, minmax(18px, 1fr)); gap: 3px; margin: 25px 0; border: 1px solid #222; padding: 10px; max-height: 200px; overflow-y: auto; }
        .bit { height: 18px; border: 1px solid #1a1a1a; transition: all 0.3s; }
        .bit.active { background: var(--blue); box-shadow: 0 0 8px var(--blue); }
        button { background: var(--neon); color: #000; border: none; padding: 20px; width: 100%; cursor: pointer; font-weight: bold; letter-spacing: 3px; font-size: 1.1em; transition: 0.2s; }
        button:hover { background: #fff; box-shadow: 0 0 30px var(--neon); }
        .readout { margin-top: 20px; border-top: 1px solid #333; padding-top: 20px; font-size: 0.9em; line-height: 1.6; }
        .val { color: var(--blue); font-weight: bold; word-break: break-all; }
        .option-item { margin-bottom: 10px; border-bottom: 1px solid #222; padding-bottom: 5px; }
    </style>
</head>
<body>

<div class="oracle-shell">
    <div style="text-align: center; margin-bottom: 20px;">
        <span style="letter-spacing: 5px; color: var(--blue)">ADELIC TRANSITION ENGINE</span>
    </div>

    <label>INPUT ARBITRARY RESULT (R)</label>
    <input type="text" id="targetRes" placeholder="Enter Large Integer..." value="35000">

    <button onclick="executeO1()">RESOLVE SINGULARITY</button>

    <div id="manifold" class="manifold"></div>

    <div id="output" class="readout" style="display:none">
        <div id="statusHeader" style="font-weight: bold; color: var(--neon); margin-bottom: 15px;"></div>
        <div id="optionsList"></div>
    </div>
</div>

<script>
    // 快速冪運算：(base^exp) % mod
function bigIntPowerMod(base, exp, mod) {
    let res = 1n;
    base = base % mod;
    while (exp > 0n) {
        if (exp % 2n === 1n) res = (res * base) % mod;
        base = (base * base) % mod;
        exp = exp / 2n;
    }
    return res;
}

// 費馬小定理過濾器 (Grand Sentinel 身份驗證)
function fermatCheck(P) {
    if (P < 2n) return false;
    if (P === 2n) return true;
    if (P % 2n === 0n) return false;
    // 根據費馬小定理：2^(P-1) ≡ 1 (mod P)
    return bigIntPowerMod(2n, P - 1n, P) === 1n;
}

    async function executeO1() {
        const raw = document.getElementById('targetRes').value;
        if (!raw) return;
        
        const R = BigInt(raw);
        const manifold = document.getElementById('manifold');
        const outputPanel = document.getElementById('output');
        const optionsList = document.getElementById('optionsList');
        const statusHeader = document.getElementById('statusHeader');
        
        manifold.innerHTML = "";
        optionsList.innerHTML = "";
        
       // 在 executeO1 內部替換原本的迴圈
let options = [];
// 1. 2-adic 賦值觀察：找出 R 的所有 2 的冪次因數 (Low-bit Leakage)
let tempR = R;
let powerOfTwo = 1n;
while (tempR > 0n && tempR % 2n === 0n) {
    powerOfTwo *= 2n;
    tempR /= 2n;
    
    // 每找到一個 2 的倍數，就可能是一個 P+1 的候選
    let p_candidate = powerOfTwo - 1n; 
    if (p_candidate > 0n && R % (p_candidate + 1n) === 0n) {
        let n_rec = R / (p_candidate + 1n);
        // 增加費馬檢查：標註哪些 P 是潛在質數
        let isPrime = fermatCheck(p_candidate);
        options.push({ n: n_rec, p: p_candidate, isPrime: isPrime });
    }
}


        if (options.length > 0) {
            // Render manifold for the first valid N (the collapse state)
            const primary = options[0];
            const bits = primary.n.toString(2);
            for (let b of bits) {
                const div = document.createElement('div');
                div.className = `bit ${b === '1' ? 'active' : ''}`;
                manifold.appendChild(div);
            }

            // Display all collapsed possibilities
            statusHeader.innerText = `SINGULARITY REACHED: COLLAPSED TO ${options.length} OPTIONS`;
            
            options.forEach(opt => {
                const item = document.createElement('div');
                item.className = 'option-item';
                item.innerHTML = `INFERRED N: <span class="val">${opt.n}</span> | P: <span class="val">${opt.p}</span>`;
                optionsList.appendChild(item);
            });

            outputPanel.style.display = "block";
            document.getElementById('targetRes').style.borderColor = "var(--blue)";
        } else {
            alert("COHERENCE FAILED: No natural decomposition within scan range.");
        }
    }
</script>
</body>
</html>
