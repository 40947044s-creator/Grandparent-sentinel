<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NASA Sentinel: Infinite AC Stream</title>
    <style>
        body { background: #000b1e; color: #e0e0e0; font-family: 'Courier New', monospace; margin: 0; padding: 20px; line-height: 1.6; }
        .container { max-width: 1000px; margin: auto; }
        h1 { color: #00ffd2; text-align: center; border-bottom: 1px solid #535353; padding-bottom: 10px; }
        
        .status-bar { background: #011d35; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-around; align-items: center; border: 1px solid #1a3a5a; font-size: 0.9em; }
        .status-val { color: #00ffd2; font-weight: bold; }

        #toggle-btn { background: #00ffd2; color: #000b1e; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; transition: 0.3s; }
        #toggle-btn.paused { background: #ff4d4d; color: white; }

        #output-strip { height: 500px; overflow-y: scroll; background: #001529; padding: 20px; border: 2px solid #1a3a5a; border-radius: 8px; margin-bottom: 30px; display: flex; flex-direction: column-reverse; }
        .audit-entry { margin-bottom: 10px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 4px; border-left: 3px solid #535353; font-size: 0.85em; }
        .glow-residue { border-left-color: #00ffd2; background: rgba(0, 255, 210, 0.05); }
        
        .nasa-link { color: #00ffd2; text-decoration: none; border-bottom: 1px dashed #00ffd2; }
    </style>
</head>
<body>
<div class="container">
    <h1>GRANDPARENT-SENTINEL // INFINITE AUDIT</h1>
    
    <div class="status-bar">
        <span>STATUS: <span id="alert-status" class="status-val">READY</span></span>
        <span>BITS: <span id="bit-count" class="status-val">0</span></span>
        <button id="toggle-btn" onclick="toggleLineage()">PAUSE ENGINE</button>
    </div>

    <div id="output-strip">
        <div class="audit-entry">Pointer Spirit Active. Aligning with NASA Archive...</div>
    </div>
</div>

<script>
    let isRunning = true;
    let globalIndex = 0;
    const SCALE = 1000;

    function toggleLineage() {
        isRunning = !isRunning;
        const btn = document.getElementById('toggle-btn');
        const status = document.getElementById('alert-status');
        
        btn.innerText = isRunning ? "PAUSE ENGINE" : "RESUME ENGINE";
        btn.className = isRunning ? "" : "paused";
        status.innerHTML = isRunning ? "AUDITING LIVE" : "PAUSED (USER)";
        
        if (isRunning) runUnlimitedAudit();
    }

    async function runUnlimitedAudit() {
        const output = document.getElementById('output-strip');
        const countEl = document.getElementById('bit-count');
        const statusEl = document.getElementById('alert-status');

        const SQL = "select hostname,pl_name,pl_orbper from pscomppars where pl_orbper is not null order by pl_pubdate desc";
        const PROXY_URL = `https://corsproxy.io/?${encodeURIComponent("https://exoplanetarchive.ipac.caltech.edu/TAP/sync?query=" + encodeURIComponent(SQL) + "&format=json")}`;

        try {
            statusEl.innerHTML = "FETCHING LINEAGE...";
            const response = await fetch(PROXY_URL);
            const dataArray = await response.json();
            statusEl.innerHTML = "STREAMING LIVE";

            while (isRunning) {
                for (let star of dataArray) {
                    if (!isRunning) return;

                    const s = parseFloat(star.pl_orbper) || 0;
                    const weightS = Math.floor(s * SCALE);
                    
                    // Aligned Math: Quotient (I) and Remainder (R)
                    const R = weightS % 53;
                    const I = Math.floor(weightS / 53); 

                    const div = document.createElement('div');
                    div.className = "audit-entry";
                    
                    if (globalIndex % 1855 === 0) {
                        div.className += " glow-residue";
                        div.innerHTML += `<strong>[SYNC POINT: CYCLE ${globalIndex/1855}]</strong><br>`;
                    }

                    const nasaLink = `https://exoplanetarchive.ipac.caltech.edu/overview/${encodeURIComponent(star.pl_name)}`;
                    div.innerHTML += `
                        <strong>Bit ${globalIndex}:</strong> <a href="${nasaLink}" target="_blank" class="nasa-link">${star.pl_name}</a><br>
                        <span>&gt; S: ${s.toFixed(4)} | I: ${I} | R: ${(R/SCALE).toFixed(3)} <strong>(AC ✓)</strong></span>
                    `;
                    
                    output.appendChild(div);
                    globalIndex++;
                    countEl.innerText = globalIndex;

                    // Accelerated Yield: We yield to the browser every 5 bits to keep UI smooth
                    if (globalIndex % 5 === 0) {
                        await new Promise(resolve => requestAnimationFrame(resolve));
                    }

                    // DOM Pruning: Keeps memory usage flat during the unlimited run
                    if (output.childNodes.length > 100) {
                        output.removeChild(output.firstChild);
                    }
                }
                console.log("Database audited. Restarting stream...");
            }
        } catch (e) {
            statusEl.innerHTML = "CONNECTION SEVERED";
        }
    }

    window.onload = runUnlimitedAudit;
</script>
</body>
</html>
