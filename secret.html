<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Independent Bucket Inference</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        .container { max-width: 1000px; margin: auto; border: 1px solid #ff00ff; padding: 25px; background: #0a0a0a; box-shadow: 0 0 50px #330033; }
        
        .header-box { border-bottom: 2px solid #ff00ff; margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: #ff00ff; margin: 0; letter-spacing: 5px; text-transform: uppercase; font-size: 1.4em; }
        .logic-tag { color: #ffff00; font-size: 0.8em; font-weight: bold; border: 1px solid #ffff00; padding: 2px 8px; }

        .control-panel { display: flex; gap: 10px; background: #111; padding: 15px; border: 1px dashed #00ff41; margin-bottom: 20px; }
        button { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 10px 15px; cursor: pointer; font-family: inherit; font-weight: bold; }
        button:hover { background: #00ff41; color: #000; }
        button.active { background: #00ff41; color: #000; }
        button.run { background: #ff00ff; color: #000; border-color: #ff00ff; margin-left: auto; }

        .main-view { display: flex; gap: 20px; }
        #canvas-box { flex: 2; border: 1px solid #333; height: 500px; background: #000; position: relative; cursor: crosshair; }
        .log { flex: 1; background: #000; height: 500px; overflow-y: scroll; border: 1px solid #333; padding: 10px; font-size: 0.85em; border-left: 4px solid #ff00ff; color: #00ff41; }
        
        .node { fill: #000; stroke: #00ff41; stroke-width: 2; transition: 0.3s; }
        .node.deg-1 { fill: #444; stroke: #ffff00; stroke-width: 3; }
        .node.deg-2 { fill: #00ff41; stroke: #fff; box-shadow: 0 0 10px #fff; }
        .node.deg-liar { fill: #ff3300; stroke: #fff; }
        
        .edge { stroke: #222; stroke-width: 2; transition: 0.5s; }
        .edge.active { stroke: #ff00ff; stroke-width: 4; stroke-dasharray: 5; animation: dash 1.5s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -20; } }

        .mask-val { color: #ffff00; font-family: monospace; font-weight: bold; }
        .paradox { color: #ff3300; font-weight: bold; }
        .instruction { font-size: 0.75em; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h1>7EARTH ORACLE: BUCKET INFERENCE</h1>
        <div class="logic-tag">MARILYN'S DEGREE THEOREM</div>
    </div>

    <div class="instruction">[DRAW MODE] CLICK to add nodes. SELECT two nodes to add edges. THE ORACLE WILL INFER THE PATH INDEPENDENTLY.</div>

    <div class="control-panel">
        <button id="btn-node" class="active" onclick="setMode('NODE')">ADD NODES</button>
        <button id="btn-edge" onclick="setMode('EDGE')">ADD EDGES</button>
        <button onclick="resetGraph()" style="color:#ff3300;">RESET</button>
        <button class="run" onclick="runOracle()">BLIND INFERENCE (O(k))</button>
    </div>

    <div class="main-view">
        <div id="canvas-box"><svg id="graphSvg" width="100%" height="100%"></svg></div>
        <div id="outputLog" class="log">[ORACLE ONLINE] Awaiting bit-bucket definition...</div>
    </div>
</div>

<script>
    let mode = 'NODE', nodes = [], edges = [], selectedNode = null;
    const svg = document.getElementById('graphSvg');

    function setMode(m) {
        mode = m;
        document.getElementById('btn-node').classList.toggle('active', m === 'NODE');
        document.getElementById('btn-edge').classList.toggle('active', m === 'EDGE');
    }

    svg.addEventListener('click', (e) => {
        if (mode === 'NODE') {
            const rect = svg.getBoundingClientRect();
            addNode(e.clientX - rect.left, e.clientY - rect.top);
        }
    });

    function addNode(x, y) {
        const id = nodes.length;
        nodes.push({ id, x, y, degree: 0 });
        const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        c.setAttribute("cx", x); c.setAttribute("cy", y); c.setAttribute("r", 15);
        c.setAttribute("class", "node"); c.setAttribute("id", "node-" + id);
        c.onclick = (e) => { e.stopPropagation(); if (mode === 'EDGE') handleEdge(id); };
        svg.appendChild(c);
        log(`Node ${id} initialized in bucket.`);
    }

    function handleEdge(id) {
        if (selectedNode === null) { selectedNode = id; document.getElementById('node-'+id).style.stroke = "#fff"; }
        else if (selectedNode !== id) { addEdge(selectedNode, id); document.getElementById('node-'+selectedNode).style.stroke = ""; selectedNode = null; }
    }

    function addEdge(u, v) {
        const id = edges.length;
        edges.push({ id, u, v, status: '?' });
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", nodes[u].x); line.setAttribute("y1", nodes[u].y);
        line.setAttribute("x2", nodes[v].x); line.setAttribute("y2", nodes[v].y);
        line.setAttribute("class", "edge"); line.setAttribute("id", "edge-" + id);
        svg.insertBefore(line, svg.firstChild);
        log(`Edge ${id} [${u}-${v}] added to bucket.`);
    }

    function log(msg, cls="") {
        const d = document.createElement('div'); if(cls) d.className = cls;
        d.innerHTML = msg; const l = document.getElementById('outputLog');
        l.appendChild(d); l.scrollTop = l.scrollHeight;
    }

    function resetGraph() { nodes = []; edges = []; selectedNode = null; svg.innerHTML = ''; log("System cleared."); }

    function updateVisuals() {
        nodes.forEach(n => {
            const el = document.getElementById('node-'+n.id);
            el.classList.remove('deg-1', 'deg-2', 'deg-liar');
            if (n.degree === 1) el.classList.add('deg-1');
            if (n.degree === 2) el.classList.add('deg-2');
            if (n.degree > 2) el.classList.add('deg-liar');
        });
    }

    function runOracle() {
        if (nodes.length < 2) return log("Axiom Error: Insufficient nodes.", "paradox");
        log("--- COMMENCING INDEPENDENT BIT INFERENCE ---");
        
        const target = (1n << BigInt(nodes.length)) - 1n;
        nodes.forEach(n => n.degree = 0);
        let confirmedEdges = new Set();
        let currentV = 0n;

        // SCAN: Treat edges as independent events
        edges.forEach((edge, idx) => {
            log(`Testing Bit ${idx} [${edge.u}-${edge.v}]...`);
            
            // HYPOTHESIS: Set Bit to 1
            let uDeg = nodes[edge.u].degree;
            let vDeg = nodes[edge.v].degree;

            // LIAR DETECTION (Degree Axiom)
            if (uDeg >= 2 || vDeg >= 2) {
                log(` -> [LIAR] Bit ${idx} violates Degree Saturation.`, "paradox");
            } else {
                // TRUTH FOUND: Update Local Degrees
                nodes[edge.u].degree++;
                nodes[edge.v].degree++;
                confirmedEdges.add(idx);
                document.getElementById('edge-'+edge.id).classList.add('active');
                
                // Update Global XOR Identity
                currentV |= (1n << BigInt(edge.u));
                currentV |= (1n << BigInt(edge.v));
                
                let liarMask = currentV ^ target;
                log(` -> [TRUTH] Mask Alignment: <span class='mask-val'>${liarMask.toString(2).padStart(nodes.length, '0')}</span>`);
            }
        });

        updateVisuals();
        let finalMask = currentV ^ target;
        log(`-------------------------------------------`);
        if (finalMask === 0n) log("[SUCCESS] Identity Converged. P=NP Verified.", "mask-val");
        else log("[PARADOX] Incomplete Identity. Entropy detected.", "paradox");
    }
</script>
</body>
</html>
