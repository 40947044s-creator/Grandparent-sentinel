<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Secret Oracle (User Draw)</title>
    <style>
        body { background: #050505; color: #ff00ff; font-family: 'Courier New', monospace; padding: 20px; }
        .container { max-width: 1000px; margin: auto; border: 1px solid #ff00ff; padding: 25px; background: #0a0a0a; box-shadow: 0 0 40px #330033; }
        
        .header-box { border-bottom: 2px solid #ff00ff; margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: #ff00ff; margin: 0; letter-spacing: 5px; }
        .status-tag { color: #00ff41; font-size: 0.8em; border: 1px solid #00ff41; padding: 2px 8px; }

        .control-panel { display: flex; gap: 10px; background: #111; padding: 15px; border: 1px dashed #ff00ff; margin-bottom: 20px; flex-wrap: wrap; }
        button { background: #000; color: #ff00ff; border: 1px solid #ff00ff; padding: 8px 15px; cursor: pointer; font-family: inherit; }
        button:hover { background: #ff00ff; color: #000; }
        button.active { background: #ff00ff; color: #000; box-shadow: 0 0 10px #ff00ff; }

        .main-view { display: flex; gap: 20px; flex-wrap: wrap; }
        #canvas-box { flex: 2; border: 1px solid #333; height: 500px; background: #000; position: relative; cursor: crosshair; min-width: 400px; }
        .log { flex: 1; background: #000; height: 500px; overflow-y: scroll; border: 1px solid #333; padding: 10px; font-size: 0.85em; border-left: 3px solid #ff00ff; color: #00ff41; min-width: 250px; }
        
        .node { fill: #000; stroke: #ff00ff; stroke-width: 2; cursor: pointer; }
        .node.visited { fill: #ff00ff; }
        .node.start-node { stroke: #00ff41; stroke-width: 4; }
        .edge { stroke: #333; stroke-width: 2; }
        .edge.active { stroke: #00ff41; stroke-width: 4; stroke-dasharray: 5; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -10; } }
        
        .instruction { font-size: 0.7em; color: #888; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h1>7EARTH ORACLE: Secret (AC)</h1>
        <div class="status-tag">LAYER 3: UNIVERSAL INFERENCE</div>
    </div>

    <div class="instruction">
        [DRAW MODE] CLICK empty space to add NODE. CLICK two nodes to add EDGE. FIRST node added is START.
    </div>

    <div class="control-panel">
        <button id="btn-node" class="active" onclick="setMode('NODE')">ADD NODES</button>
        <button id="btn-edge" onclick="setMode('EDGE')">ADD EDGES</button>
        <button onclick="resetGraph()" style="color:#ff3300; border-color:#ff3300;">RESET</button>
        <button onclick="runOracle()" style="background:#00ff41; color:#000; border-color:#00ff41; margin-left:auto;">INITIATE EXTRACTION</button>
    </div>

    <div class="main-view">
        <div id="canvas-box">
            <svg id="graphSvg" width="100%" height="100%"></svg>
        </div>
        <div id="outputLog" class="log">[ORACLE ONLINE] Awaiting user-defined topology...</div>
    </div>
</div>

<script>
    let mode = 'NODE';
    let nodes = [];
    let edges = [];
    let selectedNode = null;

    function setMode(m) {
        mode = m;
        document.getElementById('btn-node').classList.toggle('active', m === 'NODE');
        document.getElementById('btn-edge').classList.toggle('active', m === 'EDGE');
    }

    const svg = document.getElementById('graphSvg');
    svg.addEventListener('click', (e) => {
        if (mode === 'NODE') {
            const rect = svg.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            addNode(x, y);
        }
    });

    function addNode(x, y) {
        const id = nodes.length;
        nodes.push({ id, x, y });
        const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        c.setAttribute("cx", x); c.setAttribute("cy", y); c.setAttribute("r", 15);
        c.setAttribute("class", "node" + (id === 0 ? " start-node" : ""));
        c.setAttribute("id", "node-" + id);
        c.onclick = (e) => {
            e.stopPropagation();
            if (mode === 'EDGE') handleEdge(id);
        };
        svg.appendChild(c);
        log(`Node ${id} registered at [${Math.round(x)}, ${Math.round(y)}]`);
    }

    function handleEdge(id) {
        if (selectedNode === null) {
            selectedNode = id;
            document.getElementById('node-' + id).style.stroke = "#fff";
        } else if (selectedNode !== id) {
            addEdge(selectedNode, id);
            document.getElementById('node-' + selectedNode).style.stroke = "";
            selectedNode = null;
        }
    }

    function addEdge(u, v) {
        if (edges.some(e => (e.u === u && e.v === v) || (e.u === v && e.v === u))) return;
        const id = edges.length;
        edges.push({ id, u, v });
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", nodes[u].x); line.setAttribute("y1", nodes[u].y);
        line.setAttribute("x2", nodes[v].x); line.setAttribute("y2", nodes[v].y);
        line.setAttribute("class", "edge"); line.setAttribute("id", "edge-" + id);
        svg.insertBefore(line, svg.firstChild);
        log(`Edge ${id} linked: Node ${u} <-> Node ${v}`);
    }

    function resetGraph() {
        nodes = []; edges = []; selectedNode = null;
        svg.innerHTML = '';
        log("[SYSTEM] Graph cleared. Redefine topology.");
    }

    function log(msg, cls="") {
        const d = document.createElement('div');
        if(cls) d.className = cls;
        d.innerHTML = msg;
        const l = document.getElementById('outputLog');
        l.appendChild(d); l.scrollTop = l.scrollHeight;
    }

    function runOracle() {
        if (nodes.length < 2) return log("[ERROR] Insufficient nodes.", "paradox-text");
        log("--- INITIATING BIT-PEELING EXTRACTION ---");
        
        let visited = new Set([0]);
        let current = 0;
        let pathEdges = [];

        // Simple bit-peeling simulation over user graph
        for (let i = 0; i < nodes.length * 2; i++) { // Max iterations
            let possibleEdges = edges.filter(e => 
                (e.u === current || e.v === current) && 
                !visited.has(e.u === current ? e.v : e.u)
            );

            if (possibleEdges.length > 0) {
                let e = possibleEdges[0]; // Greedy inference for demo
                let next = (e.u === current) ? e.v : e.u;
                visited.add(next);
                document.getElementById('edge-' + e.id).classList.add('active');
                document.getElementById('node-' + next).classList.add('visited');
                log(`[TRUTH] Choice ${i}: Edge ${e.id} accepted. Node ${next} reached.`);
                current = next;
            } else {
                log(`[PARADOX] Dead-end at Node ${current}. Pruning branch.`);
                break;
            }
            if (visited.size === nodes.length) break;
        }

        if (visited.size === nodes.length) log("VERDICT: HAMILTONIAN PATH EXTRACTED.", "success");
        else log("VERDICT: NO PATH DETECTED. Graph remains unresolved.", "collision");
    }
</script>
</body>
</html>
