<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Spatial Pair Inference</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        .container { max-width: 1000px; margin: auto; border: 1px solid #00d4ff; padding: 25px; background: #0a0a0a; box-shadow: 0 0 50px #001122; }
        
        .header-box { border-bottom: 2px solid #00d4ff; margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: #00d4ff; margin: 0; letter-spacing: 5px; text-transform: uppercase; font-size: 1.4em; }
        .logic-tag { color: #ffff00; font-size: 0.8em; font-weight: bold; border: 1px solid #ffff00; padding: 2px 8px; }

        .control-panel { display: flex; gap: 10px; background: #111; padding: 15px; border: 1px dashed #00d4ff; margin-bottom: 20px; }
        button { background: #000; color: #00d4ff; border: 1px solid #00d4ff; padding: 10px 15px; cursor: pointer; font-family: inherit; font-weight: bold; }
        button:hover { background: #00d4ff; color: #000; }
        button.run { background: #00ff41; color: #000; border-color: #00ff41; margin-left: auto; }

        .main-view { display: flex; gap: 20px; }
        #canvas-box { flex: 2; border: 1px solid #333; height: 500px; background: #000; position: relative; }
        .log { flex: 1; background: #000; height: 500px; overflow-y: scroll; border: 1px solid #333; padding: 10px; font-size: 0.85em; border-left: 4px solid #00d4ff; color: #00ff41; }
        
        .node { fill: #000; stroke: #00d4ff; stroke-width: 2; }
        .node-label { fill: #fff; font-size: 10px; pointer-events: none; }
        .edge { stroke: #111; stroke-width: 2; }
        .edge.active { stroke: #00ff41; stroke-width: 4; stroke-dasharray: 5; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -20; } }

        .success { color: #ffff00; font-weight: bold; }
        .paradox { color: #ff3300; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h1>7EARTH ORACLE: SPATIAL PAIRS</h1>
        <div class="logic-tag">GLOBAL AND SENTINEL</div>
    </div>

    <div class="control-panel">
        <button onclick="setMode('NODE')">ADD NODES</button>
        <button onclick="setMode('EDGE')">ADD PAIRS</button>
        <button onclick="resetGraph()" style="color:#ff3300;">RESET</button>
        <button class="run" onclick="runSpatialInference()">EXTRACT P (PLANE INDEX)</button>
    </div>

    <div class="main-view">
        <div id="canvas-box"><svg id="graphSvg" width="100%" height="100%"></svg></div>
        <div id="outputLog" class="log">[ORACLE ONLINE] Index nodes by X-Y coordinates...</div>
    </div>
</div>

<script>
    let mode = 'NODE', nodes = [], edges = [], selectedNode = null;
    const svg = document.getElementById('graphSvg');

    function setMode(m) { mode = m; log(`Mode: ${m}`); }

    svg.addEventListener('click', (e) => {
        if (mode === 'NODE') {
            const rect = svg.getBoundingClientRect();
            addNode(e.clientX - rect.left, e.clientY - rect.top);
        }
    });

    function addNode(x, y) {
        nodes.push({ x, y, degree: 0 });
        // Re-index nodes spatially: Left to Right, then Top to Bottom
        nodes.sort((a, b) => (a.y - b.y) || (a.x - b.x));
        renderNodes();
    }

    function renderNodes() {
        svg.querySelectorAll('.node, .node-label').forEach(n => n.remove());
        nodes.forEach((n, i) => {
            const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            c.setAttribute("cx", n.x); c.setAttribute("cy", n.y); c.setAttribute("r", 15);
            c.setAttribute("class", "node"); c.setAttribute("id", "node-" + i);
            c.onclick = (e) => { e.stopPropagation(); if (mode === 'EDGE') handleEdge(i); };
            svg.appendChild(c);

            const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
            t.setAttribute("x", n.x - 5); t.setAttribute("y", n.y + 5);
            t.setAttribute("class", "node-label");
            t.textContent = i;
            svg.appendChild(t);
        });
    }

    function handleEdge(id) {
        if (selectedNode === null) { selectedNode = id; }
        else if (selectedNode !== id) { addEdge(selectedNode, id); selectedNode = null; }
    }

    function addEdge(u, v) {
        const id = edges.length;
        edges.push({ id, u, v });
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", nodes[u].x); line.setAttribute("y1", nodes[u].y);
        line.setAttribute("x2", nodes[v].x); line.setAttribute("y2", nodes[v].y);
        line.setAttribute("class", "edge"); line.setAttribute("id", "edge-" + id);
        svg.insertBefore(line, svg.firstChild);
    }

    function log(msg, cls="") {
        const d = document.createElement('div'); if(cls) d.className = cls;
        d.innerHTML = msg; const l = document.getElementById('outputLog');
        l.appendChild(d); l.scrollTop = l.scrollHeight;
    }

    function resetGraph() { nodes = []; edges = []; svg.innerHTML = ''; log("System reset."); }

    function runSpatialInference() {
        if (nodes.length < 2) return;
        log("--- COMMENCING SPATIAL PAIR INFERENCE ---");
        
        nodes.forEach(n => n.degree = 0);
        let globalAND = true;
        let activePairs = [];

        // We process edges as Node-Link Pairs
        edges.forEach((edge, idx) => {
            log(`Probing Pair (${edge.u}, ${edge.v})...`);
            
            // The Axiomatic AND: Can Node U and Node V accept this link?
            if (nodes[edge.u].degree < 2 && nodes[edge.v].degree < 2) {
                nodes[edge.u].degree++;
                nodes[edge.v].degree++;
                activePairs.push(idx);
                document.getElementById('edge-'+edge.id).classList.add('active');
                log(` -> [LINKED] Nodes ${edge.u} and ${edge.v} fused.`, "success");
            } else {
                log(` -> [PRUNED] Pair violates Degree Limit.`, "paradox");
            }
        });

        // Final Sentinel AND Check
        nodes.forEach((n, i) => {
            if (n.degree === 0) globalAND = false;
        });

        log(`-------------------------------------------`);
        if (globalAND) log("[VERDICT] GLOBAL AND = 1. Path Verified.", "success");
        else log("[VERDICT] GLOBAL AND = 0. Incomplete Identity.", "paradox");
    }
</script>
</body>
</html>
