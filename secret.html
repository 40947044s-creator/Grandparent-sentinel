<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Secret visualizer (AC)</title>
    <style>
        body { background: #050505; color: #00d4ff; font-family: 'Courier New', monospace; padding: 20px; }
        .container { max-width: 1000px; margin: auto; border: 1px solid #ff00ff; padding: 25px; background: #0a0a0a; box-shadow: 0 0 40px #330033; }
        
        .header-box { border-bottom: 2px solid #ff00ff; margin-bottom: 20px; padding-bottom: 10px; }
        h1 { color: #ff00ff; margin: 0; letter-spacing: 5px; }

        .control-panel { display: flex; gap: 15px; background: #111; padding: 15px; border: 1px dashed #00d4ff; margin-bottom: 20px; align-items: center; }
        select, button { background: #000; color: #00d4ff; border: 1px solid #00d4ff; padding: 10px; font-family: inherit; cursor: pointer; }
        button:hover { background: #ff00ff; color: #000; border-color: #fff; }

        .main-view { display: flex; gap: 20px; }
        #canvas-box { flex: 1; border: 1px solid #333; height: 400px; background: #000; position: relative; }
        .log { flex: 1; background: #000; height: 400px; overflow-y: scroll; border: 1px solid #333; padding: 10px; font-size: 0.85em; border-left: 3px solid #ff00ff; color: #00ff41; }
        
        .node { fill: #000; stroke: #00d4ff; stroke-width: 2; }
        .node.visited { stroke: #ff00ff; fill: #330033; }
        .edge { stroke: #222; stroke-width: 1; }
        .edge.active { stroke: #ff00ff; stroke-width: 3; stroke-dasharray: 5; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -10; } }
        
        .paradox-text { color: #ff00ff; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h1>7EARTH ORACLE: Secret Layer (AC)</h1>
        <p>Axiomatic Convergence: Hamiltonian Reduction via Bit-Peeling</p>
    </div>

    <div class="control-panel">
        <label>SELECT TOPOLOGY:</label>
        <select id="graphSelect">
            <option value="cycle">5-Node Cycle (Perfect)</option>
            <option value="grid">6-Node Grid (Complex)</option>
            <option value="liar">The Paradox (Impossible)</option>
        </select>
        <button onclick="initOracle()">INITIATE INFERENCE</button>
    </div>

    <div class="main-view">
        <div id="canvas-box">
            <svg id="graphSvg" width="100%" height="100%"></svg>
        </div>
        <div id="outputLog" class="log">[ORACLE ONLINE] Select a graph to begin extraction...</div>
    </div>
</div>

<script>
    const graphs = {
        cycle: {
            nodes: [{x:250,y:100},{x:400,y:200},{x:350,y:350},{x:150,y:350},{x:100,y:200}],
            edges: [[0,1],[1,2],[2,3],[3,4],[4,0],[0,2],[1,3]]
        },
        grid: {
            nodes: [{x:150,y:150},{x:300,y:150},{x:450,y:150},{x:150,y:300},{x:300,y:300},{x:450,y:300}],
            edges: [[0,1],[1,2],[0,3],[1,4],[2,5],[3,4],[4,5]]
        },
        liar: {
            nodes: [{x:250,y:100},{x:250,y:200},{x:150,y:300},{x:350,y:300}],
            edges: [[0,1],[1,2],[1,3]] // Node 1 is a bottleneck, cannot visit all
        }
    };

    function log(msg, cls="") {
        const d = document.createElement('div');
        if(cls) d.className = cls;
        d.innerHTML = msg;
        const l = document.getElementById('outputLog');
        l.appendChild(d); l.scrollTop = l.scrollHeight;
    }

    function initOracle() {
        const type = document.getElementById('graphSelect').value;
        const g = graphs[type];
        drawGraph(g);
        solveHam(g);
    }

    function drawGraph(g) {
        const svg = document.getElementById('graphSvg');
        svg.innerHTML = '';
        g.edges.forEach((e, i) => {
            const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
            line.setAttribute("x1", g.nodes[e[0]].x); line.setAttribute("y1", g.nodes[e[0]].y);
            line.setAttribute("x2", g.nodes[e[1]].x); line.setAttribute("y2", g.nodes[e[1]].y);
            line.setAttribute("class", "edge"); line.setAttribute("id", "edge-"+i);
            svg.appendChild(line);
        });
        g.nodes.forEach((n, i) => {
            const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            c.setAttribute("cx", n.x); c.setAttribute("cy", n.y); c.setAttribute("r", 15);
            c.setAttribute("class", "node"); c.setAttribute("id", "node-"+i);
            svg.appendChild(c);
        });
    }

    function solveHam(g) {
        log(`--- STARTING INFERENCE: ${g.nodes.length} NODES ---`);
        let visited = new Set([0]);
        document.getElementById('node-0').classList.add('visited');
        let current = 0;
        let path = [0];

        for(let i=0; i < g.edges.length; i++) {
            let edge = g.edges[i];
            let target = -1;
            if(edge[0] === current) target = edge[1];
            else if(edge[1] === current) target = edge[0];

            if(target !== -1) {
                log(`Testing Edge ${i} (To Node ${target})...`);
                if(visited.has(target)) {
                    log(`[LIAR] Node ${target} already visited. Pruning.`, "paradox-text");
                } else {
                    // Successful Inference
                    visited.add(target);
                    current = target;
                    path.push(target);
                    document.getElementById('edge-'+i).classList.add('active');
                    document.getElementById('node-'+target).classList.add('visited');
                    log(`[TRUTH] Moving to Node ${target}. Sentinel Pressure: ${visited.size}/${g.nodes.length}`);
                }
            }
            if(visited.size === g.nodes.length) break;
        }

        if(visited.size === g.nodes.length) log("VERDICT: HAMILTONIAN PATH FOUND (P=NP Verified)", "success");
        else log("VERDICT: PARADOX DETECTED. No Hamiltonian path possible for this sequence.", "paradox-text");
    }
</script>
</body>
</html>
