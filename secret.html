<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Grandparent Sentinel: Visual Route Grounding</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #121212; color: #00ffcc; padding: 20px; margin: 0; }
        .container { display: flex; gap: 20px; height: 90vh; }
        .canvas-panel { flex: 1; background: #1e1e1e; border: 1px solid #333; display: flex; flex-direction: column; }
        canvas { flex: 1; background: #181818; cursor: crosshair; }
        .info-panel { width: 420px; background: #1e1e1e; padding: 15px; border: 1px solid #333; overflow-y: auto; }
        button { background: #00ffcc; color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; }
        .node-item { display: flex; justify-content: space-between; background: #2a2a2a; margin: 5px 0; padding: 8px; font-size: 0.85em; }
        .liar-state { color: #ff4444; font-weight: bold; }
        hr { border: 0; border-top: 1px solid #444; margin: 15px 0; }
    </style>
</head>
<body>
    <h1>Adelic Inference Engine: Visual Grounding</h1>
    <div class="container">
        <div class="canvas-panel">
            <div style="padding: 10px; background: #222; display: flex; gap: 10px;">
                <button onclick="runGlobalInference()">Run Adelic Inference</button>
                <button onclick="clearGraph()" style="background:#ff4444; color:#fff;">Clear</button>
                <span style="align-self: center; font-size: 0.8em; color: #888;">Click to add nodes | Drag to add edges</span>
            </div>
            <canvas id="graphCanvas"></canvas>
        </div>
        <div class="info-panel">
            <div id="sieve-results">Awaiting Topology Analysis...</div>
            <hr>
            <h3>Global State (S)</h3>
            <p id="global-state" style="word-break: break-all; font-size: 0.8em; color: #888;">0</p>
            <hr>
            <h3>Adelic Manifold</h3>
            <ul id="graph-nodes" class="node-list"></ul>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        const RADIX = 4n;
        let nodes = [], edges = [], adj = {}, isDragging = false, dragStart = null, pathEdges = [];

        function resize() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; draw(); }
        window.onresize = resize; setTimeout(resize, 100);

        canvas.onmousedown = (e) => {
            const r = canvas.getBoundingClientRect();
            const x = e.clientX - r.left, y = e.clientY - r.top;
            const target = nodes.find(n => Math.hypot(n.x - x, n.y - y) <= 15);
            if (target) { isDragging = true; dragStart = target; }
            else { nodes.push({ id: nodes.length, x, y, state: 0 }); draw(); }
        };

        canvas.onmouseup = (e) => {
            if (isDragging && dragStart) {
                const r = canvas.getBoundingClientRect();
                const target = nodes.find(n => Math.hypot(n.x - (e.clientX - r.left), n.y - (e.clientY - r.top)) <= 15);
                if (target && target !== dragStart) {
                    if (!edges.find(ed => (ed.f === dragStart.id && ed.t === target.id) || (ed.f === target.id && ed.t === dragStart.id))) {
                        edges.push({ f: dragStart.id, t: target.id });
                    }
                }
            }
            isDragging = false; draw();
        };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // 1. Draw all edges (Background)
            edges.forEach(e => {
                ctx.beginPath(); ctx.moveTo(nodes[e.f].x, nodes[e.f].y); ctx.lineTo(nodes[e.t].x, nodes[e.t].y);
                ctx.strokeStyle = '#333'; ctx.lineWidth = 2; ctx.stroke();
            });

            // 2. Draw path edges (The Signal)
            pathEdges.forEach(e => {
                ctx.beginPath(); ctx.moveTo(nodes[e.f].x, nodes[e.f].y); ctx.lineTo(nodes[e.t].x, nodes[e.t].y);
                ctx.strokeStyle = '#00ffcc'; ctx.lineWidth = 4; ctx.shadowBlur = 10; ctx.shadowColor = '#00ffcc';
                ctx.stroke(); ctx.shadowBlur = 0;
            });

            // 3. Draw nodes
            nodes.forEach(n => {
                ctx.beginPath(); ctx.arc(n.x, n.y, 15, 0, 7);
                ctx.fillStyle = n.state === 1 ? '#00ccff' : (n.state === 2 ? '#00ffcc' : '#222');
                ctx.fill(); ctx.strokeStyle = '#fff'; ctx.lineWidth = 1; ctx.stroke();
                ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.font = '12px Courier';
                ctx.fillText(n.id, n.x, n.y + 4);
            });
        }

        function runGlobalInference() {
            if (!nodes.length) return;
            pathEdges = []; // Reset visual route
            adj = {}; nodes.forEach(n => adj[n.id] = []);
            edges.forEach(e => { adj[e.f].push(e.t); adj[e.t].push(e.f); });
            
            let found = false;
            for (let i = 0; i < nodes.length; i++) {
                nodes.forEach(n => n.state = 0);
                nodes[i].state = 1; 
                if (recursiveFlip(nodes[i], 1)) { found = true; break; }
            }
            
            const S = nodes.reduce((a, n, i) => a + (BigInt(n.state) * (RADIX ** BigInt(i))), 0n);
            renderProof(found, S);
            draw();
            document.getElementById('graph-nodes').innerHTML = nodes.map(n => 
                `<li class="node-item">Node ${n.id} <span class="valid-state">State: ${n.state}</span></li>`
            ).join('');
        }

        function recursiveFlip(curr, count) {
            if (count === nodes.length) return true;
            for (let id of adj[curr.id]) {
                let next = nodes.find(n => n.id === id);
                if (next.state === 0) {
                    // Store the edge in the visual path
                    const edge = { f: curr.id, t: next.id };
                    pathEdges.push(edge);

                    if (count > 1) curr.state++; else curr.state = 1;
                    next.state = 1;

                    if (recursiveFlip(next, count + 1)) return true;

                    // Backtrack (Peel the Ghost Carry)
                    pathEdges.pop();
                    if (count > 1) curr.state--; else curr.state = 1;
                    next.state = 0;
                }
            }
            return false;
        }

        function renderProof(found, S) {
            const res = document.getElementById('sieve-results');
            const ones = nodes.filter(n => n.state === 1).length;
            
            if (found && ones === 2) {
                document.getElementById('global-state').innerText = S.toString();
                res.innerHTML = `<h2 style="color:#00ffcc;">100% AC APPROVED</h2>
                <p>Grounding: 2 Endpoints ✅ | No Ghost Carries ✅</p>
                <p>Adelic Invariant S is locked.</p>`;
            } else {
                document.getElementById('global-state').innerText = "NULL";
                res.innerHTML = `<h2 class="liar-state">100% AC DISMISSED</h2><p>Residue Rattle detected. No valid route survives.</p>`;
            }
        }

        function clearGraph() { nodes = []; edges = []; pathEdges = []; draw(); }
    </script>
</body>
</html>
