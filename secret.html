<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project NP | XOR Sentinel (AC)</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        .container { max-width: 1000px; margin: auto; border: 1px solid #00ff41; padding: 25px; background: #0a0a0a; box-shadow: 0 0 50px #002200; }
        
        .header-box { border-bottom: 2px solid #00ff41; margin-bottom: 20px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: #00ff41; margin: 0; letter-spacing: 5px; text-transform: uppercase; }
        .logic-tag { color: #ffff00; font-size: 0.8em; font-weight: bold; border: 1px solid #ffff00; padding: 2px 8px; }

        .control-panel { display: flex; gap: 10px; background: #111; padding: 15px; border: 1px dashed #00ff41; margin-bottom: 20px; }
        button { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 10px 20px; cursor: pointer; font-family: inherit; font-weight: bold; }
        button:hover { background: #00ff41; color: #000; }
        button.active { background: #00ff41; color: #000; }
        button.run { background: #ffff00; color: #000; border-color: #ffff00; margin-left: auto; }

        .main-view { display: flex; gap: 20px; }
        #canvas-box { flex: 2; border: 1px solid #333; height: 500px; background: #000; position: relative; cursor: crosshair; }
        .log { flex: 1; background: #000; height: 500px; overflow-y: scroll; border: 1px solid #333; padding: 10px; font-size: 0.85em; border-left: 4px solid #ffff00; color: #00ff41; }
        
        .node { fill: #000; stroke: #00ff41; stroke-width: 2; }
        .node.visited { fill: #00ff41; stroke: #fff; }
        .edge { stroke: #222; stroke-width: 2; }
        .edge.active { stroke: #ffff00; stroke-width: 4; stroke-dasharray: 5; animation: dash 1s linear infinite; }
        @keyframes dash { to { stroke-dashoffset: -10; } }

        .mask-val { color: #ffff00; font-family: monospace; font-weight: bold; }
        .paradox { color: #ff3300; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h1>7EARTH ORACLE: XOR ALIGNMENT</h1>
        <div class="logic-tag">P ⊕ Target = 0</div>
    </div>

    <div class="control-panel">
        <button id="btn-node" class="active" onclick="setMode('NODE')">ADD NODES</button>
        <button id="btn-edge" onclick="setMode('EDGE')">ADD EDGES</button>
        <button onclick="resetGraph()" style="color:#ff3300;">RESET</button>
        <button class="run" onclick="runOracle()">EXTRACT VIA XOR SENTINEL</button>
    </div>

    <div class="main-view">
        <div id="canvas-box">
            <svg id="graphSvg" width="100%" height="100%"></svg>
        </div>
        <div id="outputLog" class="log">[ORACLE ONLINE] Awaiting topology definition...</div>
    </div>
</div>

<script>
    let mode = 'NODE';
    let nodes = [];
    let edges = [];
    let selectedNode = null;

    function setMode(m) {
        mode = m;
        document.getElementById('btn-node').classList.toggle('active', m === 'NODE');
        document.getElementById('btn-edge').classList.toggle('active', m === 'EDGE');
    }

    const svg = document.getElementById('graphSvg');
    svg.addEventListener('click', (e) => {
        if (mode === 'NODE') {
            const rect = svg.getBoundingClientRect();
            addNode(e.clientX - rect.left, e.clientY - rect.top);
        }
    });

    function addNode(x, y) {
        const id = nodes.length;
        nodes.push({ id, x, y });
        const c = document.createElementNS("http://www.w3.org/2000/svg", "circle");
        c.setAttribute("cx", x); c.setAttribute("cy", y); c.setAttribute("r", 15);
        c.setAttribute("class", "node"); c.setAttribute("id", "node-" + id);
        c.onclick = (e) => { e.stopPropagation(); if (mode === 'EDGE') handleEdge(id); };
        svg.appendChild(c);
        log(`Node ${id} initialized.`);
    }

    function handleEdge(id) {
        if (selectedNode === null) { selectedNode = id; document.getElementById('node-'+id).style.stroke = "#fff"; }
        else if (selectedNode !== id) { addEdge(selectedNode, id); document.getElementById('node-'+selectedNode).style.stroke = ""; selectedNode = null; }
    }

    function addEdge(u, v) {
        const id = edges.length;
        edges.push({ id, u, v });
        const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
        line.setAttribute("x1", nodes[u].x); line.setAttribute("y1", nodes[u].y);
        line.setAttribute("x2", nodes[v].x); line.setAttribute("y2", nodes[v].y);
        line.setAttribute("class", "edge"); line.setAttribute("id", "edge-" + id);
        svg.insertBefore(line, svg.firstChild);
        log(`Edge ${id} linked: [${u}-${v}]`);
    }

    function log(msg, cls="") {
        const d = document.createElement('div'); if(cls) d.className = cls;
        d.innerHTML = msg; const l = document.getElementById('outputLog');
        l.appendChild(d); l.scrollTop = l.scrollHeight;
    }

    function resetGraph() { nodes = []; edges = []; selectedNode = null; svg.innerHTML = ''; log("System reset."); }

    function runOracle() {
        if (nodes.length < 2) return log("Insufficient nodes.", "paradox");
        log("--- COMMENCING XOR PARITY EXTRACTION ---");
        
        const targetMask = (1n << BigInt(nodes.length)) - 1n;
        log(`Sentinel Identity (Target): <span class='mask-val'>${targetMask.toString(2).padStart(nodes.length, '0')}</span>`);

        let visited = new Set([0]);
        let current = 0;
        document.getElementById('node-0').classList.add('visited');

        for (let step = 1; step <= nodes.length * 2; step++) {
            // Current Parity State
            let currentV = 0n;
            visited.forEach(n => currentV |= (1n << BigInt(n)));
            
            // THE LIAR MASK: What bits are still missing?
            let liarMask = currentV ^ targetMask;
            log(`Step ${step} | Liar Mask: <span class='mask-val'>${liarMask.toString(2).padStart(nodes.length, '0')}</span>`);

            if (liarMask === 0n) {
                log("[SUCCESS] XOR Convergence reached. Identity Confirmed.", "mask-val");
                break;
            }

            // Find an edge that flips a '0' in the currentV to a '1'
            let validEdge = edges.find(e => {
                let neighbor = (e.u === current) ? e.v : (e.v === current ? e.u : -1);
                return neighbor !== -1 && !visited.has(neighbor);
            });

            if (validEdge) {
                let next = (validEdge.u === current) ? validEdge.v : validEdge.u;
                visited.add(next);
                document.getElementById('edge-' + validEdge.id).classList.add('active');
                document.getElementById('node-' + next).classList.add('visited');
                log(`[TRUTH] Edge ${validEdge.id} aligns with Sentinel.`);
                current = next;
            } else {
                log("[PARADOX] Carry-ripple stalled. Branch is a Liar.", "paradox");
                break;
            }
        }
    }
</script>
</body>
</html>
