<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grandparent Sentinel: Interactive Topology Mapping</title>
    <style>
        body { font-family: 'Courier New', Courier, monospace; background-color: #121212; color: #00ffcc; padding: 20px; margin: 0; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; }
        h1, h2, h3 { color: #ffffff; margin-top: 0; }
        .container { display: flex; flex: 1; gap: 20px; min-height: 0; }
        .canvas-panel { flex: 1; background-color: #1e1e1e; border: 1px solid #333; border-radius: 5px; position: relative; display: flex; flex-direction: column; }
        canvas { flex: 1; cursor: crosshair; background: #181818; }
        .controls { padding: 10px; background: #222; border-bottom: 1px solid #333; display: flex; gap: 10px; align-items: center; }
        .info-panel { width: 420px; background-color: #1e1e1e; padding: 15px; border: 1px solid #333; border-radius: 5px; overflow-y: auto; }
        .stream-box { background: #2a2a2a; padding: 10px; margin-bottom: 10px; border-left: 3px solid #00ffcc; font-size: 0.85em; }
        .node-list { list-style: none; padding: 0; margin: 0; }
        .node-item { margin: 5px 0; padding: 5px; background: #333; display: flex; justify-content: space-between; font-size: 0.85em; }
        .liar-state { color: #ff4444; font-weight: bold; }
        .valid-state { color: #00ccff; }
        button { background: #00ffcc; color: #000; border: none; padding: 8px 12px; cursor: pointer; font-weight: bold; border-radius: 3px; }
        button:hover { background: #ffffff; }
        .danger-btn { background: #ff4444; color: white; }
        hr { border: 0; border-top: 1px solid #444; margin: 15px 0; }
    </style>
</head>
<body>
    <h1>Adelic Inference Engine: Interactive Topology</h1>
    <p>Mapping graph topology to a 2-adic numeric manifold ($Z_a = 4$).</p>

    <div class="container">
        <div class="canvas-panel">
            <div class="controls">
                <button onclick="analyzeTopology()">1. Analyze Streams</button>
                <button onclick="runGlobalInference()">2. Run Adelic Inference</button>
                <button class="danger-btn" onclick="clearGraph()">Clear Graph</button>
            </div>
            <canvas id="graphCanvas"></canvas>
        </div>

        <div class="info-panel">
            <h3>Adelic Sieve Analysis</h3>
            <div id="sieve-results"><p>Awaiting inference step...</p></div>
            <hr>
            <h3>Global State (S)</h3>
            <p id="global-state" style="word-break: break-all; font-size: 0.8em; color: #aaa;">0</p>
            <hr>
            <h3>Adelic Node States</h3>
            <ul id="graph-nodes" class="node-list"></ul>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('graphCanvas');
        const ctx = canvas.getContext('2d');
        const RADIX = 4n;
        const NODE_RADIUS = 15;
        let nodes = [], edges = [], adj = {}, isDragging = false, dragStart = null, mouseX = 0, mouseY = 0;

        function resize() { canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight - 50; draw(); }
        window.onresize = resize; setTimeout(resize, 100);

        canvas.onmousedown = (e) => {
            const r = canvas.getBoundingClientRect();
            const x = e.clientX - r.left, y = e.clientY - r.top;
            const target = nodes.find(n => Math.hypot(n.x - x, n.y - y) <= NODE_RADIUS);
            if (target) { isDragging = true; dragStart = target; }
            else { nodes.push({ id: nodes.length, x, y, state: 0 }); draw(); updateNodes(); }
        };
        canvas.onmousemove = (e) => { const r = canvas.getBoundingClientRect(); mouseX = e.clientX - r.left; mouseY = e.clientY - r.top; if (isDragging) draw(); };
        canvas.onmouseup = () => {
            if (isDragging && dragStart) {
                const target = nodes.find(n => Math.hypot(n.x - mouseX, n.y - mouseY) <= NODE_RADIUS);
                if (target && target !== dragStart) {
                    const exists = edges.find(ed => (ed.f === dragStart.id && ed.t === target.id) || (ed.f === target.id && ed.t === dragStart.id));
                    if (!exists) edges.push({ f: dragStart.id, t: target.id });
                }
            }
            isDragging = false; dragStart = null; draw(); updateNodes();
        };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            edges.forEach(e => {
                ctx.beginPath(); ctx.moveTo(nodes[e.f].x, nodes[e.f].y); ctx.lineTo(nodes[e.t].x, nodes[e.t].y);
                ctx.strokeStyle = '#444'; ctx.lineWidth = 2; ctx.stroke();
            });
            if (isDragging && dragStart) {
                ctx.beginPath(); ctx.moveTo(dragStart.x, dragStart.y); ctx.lineTo(mouseX, mouseY);
                ctx.strokeStyle = '#00ffcc'; ctx.setLineDash([5,5]); ctx.stroke(); ctx.setLineDash([]);
            }
            nodes.forEach(n => {
                ctx.beginPath(); ctx.arc(n.x, n.y, NODE_RADIUS, 0, 7);
                ctx.fillStyle = n.state === 3 ? '#ff4444' : (n.state > 0 ? '#00ccff' : '#222');
                ctx.fill(); ctx.strokeStyle = '#fff'; ctx.stroke();
                ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.fillText(n.id, n.x, n.y + 4);
            });
        }

        function analyzeTopology() {
            adj = {}; nodes.forEach(n => adj[n.id] = []);
            edges.forEach(e => { adj[e.f].push(e.t); adj[e.t].push(e.f); });
        }

        function isPrime(n) { if (n < 2n) return false; for (let i = 2n; i * i <= n; i++) if (n % i === 0n) return false; return true; }
        function findUniversalPrime(N) {
            let p = BigInt(N); if (p % 2n === 0n) p++;
            while (true) {
                if (isPrime(p)) {
                    let k = 1n, res = 4n % p;
                    while (res !== 1n && k < p) { res = (res * 4n) % p; k++; }
                    if (k >= BigInt(N)) return { p, k };
                }
                p += 2n;
            }
        }

        function runGlobalInference() {
            if (!nodes.length) return;
            analyzeTopology();
            let found = false;
            for (let i = 0; i < nodes.length; i++) {
                nodes.forEach(n => n.state = 0);
                nodes[i].state = 1; // Wave Eve Injection
                if (recursiveFlip(nodes[i], 1)) { found = true; break; }
            }
            const S = nodes.reduce((a, n, i) => a + (BigInt(n.state) * (RADIX ** BigInt(i))), 0n);
            document.getElementById('global-state').innerText = found ? S.toString() : "NULL";
            renderProof(found, S);
            draw(); updateNodes();
        }

        function recursiveFlip(curr, count) {
            if (count === nodes.length) return true;
            for (let id of adj[curr.id]) {
                let next = nodes.find(n => n.id === id);
                if (next.state === 0) {
                    curr.state++; next.state++;
                    if (recursiveFlip(next, count + 1)) return true;
                    curr.state--; next.state--;
                }
            }
            return false;
        }

        function renderProof(found, S) {
            const res = document.getElementById('sieve-results');
            if (!found) { res.innerHTML = `<p class="liar-state">100% AC DISMISSED: Non-Hamiltonian</p>`; return; }
            const U = findUniversalPrime(nodes.length);
            res.innerHTML = `
                <p style="color:#00ffcc;"><strong>100% AC APPROVED</strong></p>
                <strong>Marilyn Sieve:</strong><br>
                Mod 5 (Bipartite): ${S % 5n === 0n ? '✅' : '❌'}<br>
                Mod 7 (Cyclic): ${S % 7n === 0n ? '✅' : '❌'}<br>
                Mod ${U.p} (N-Guard): ${S % U.p === 0n ? '✅' : '❌'}<br>
                <small>Universal Prime Range: ${U.k} nodes</small>
            `;
        }

        function updateNodes() {
            document.getElementById('graph-nodes').innerHTML = nodes.map(n => `<li class="node-item">v_${n.id} <span>State: ${n.state}</span></li>`).join('');
        }
        function clearGraph() { nodes = []; edges = []; draw(); updateNodes(); }
        function simulateAdelicRipple() { runGlobalInference(); }
    </script>
</body>
</html>
