<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project NP | Secret Layer (Path Inference)</title>
    <style>
        body { background: #050505; color: #ff00ff; font-family: 'Courier New', monospace; padding: 20px; line-height: 1.4; }
        .container { max-width: 950px; margin: auto; border: 1px solid #ff00ff; padding: 25px; box-shadow: 0 0 30px #220022; background: #0a0a0a; }
        
        h1 { margin: 0 0 10px 0; letter-spacing: 4px; text-transform: uppercase; font-size: 1.6em; color: #ff00ff; }
        .sub-header { color: #00d4ff; font-size: 0.9em; margin-bottom: 20px; }

        .input-box { background: #111; padding: 20px; border: 1px dashed #ff00ff; margin-bottom: 20px; }
        label { display: block; font-size: 0.8em; opacity: 0.8; margin-bottom: 5px; }
        
        button.action-btn { background: #ff00ff; color: #000; border: none; padding: 15px 40px; cursor: pointer; font-weight: bold; font-size: 1.1em; transition: 0.2s; letter-spacing: 2px; width: 100%; }
        button.action-btn:hover { background: #fff; box-shadow: 0 0 20px #fff; }

        .log { background: #000; padding: 15px; height: 400px; overflow-y: scroll; border: 1px solid #333; margin-top: 20px; font-size: 0.85em; border-left: 4px solid #ff00ff; color: #00ff41; }
        .paradox { color: #ff00ff; font-weight: bold; }
        .path-active { color: #00d4ff; }
        .path-inactive { color: #444; }

        .graph-viz { margin-top: 20px; border: 1px solid #333; height: 100px; display: flex; align-items: center; justify-content: center; font-size: 1.2em; }
    </style>
</head>
<body>

<div class="container">
    <h1>7EARTH ORACLE: Secret Layer</h1>
    <div class="sub-header">TRANSCRIPT: Hamiltonian Path Inference | Mode: Bit-Mask Mapping</div>
    
    <div class="input-box">
        <label>TARGET NODES: 5 | EDGES (BITS): 10</label>
        <p>Axiom: Each bit corresponds to an edge. 1 = Path Chosen, 0 = Ignored.</p>
        <button class="action-btn" onclick="runPathInference()">INITIATE PATH EXTRACTION</button>
    </div>

    <div id="outputLog" class="log">
        [ENCRYPTED] Awaiting Graph Parameters...
    </div>

    <div id="graphView" class="graph-viz">
        Graph Connectivity: [ Waiting for Oracle ]
    </div>
</div>

<script>
    // Logic: A simple 5-node graph where we want to find a path 0->1->2->3->4
    // We represent edges as bits.
    const edges = [
        { u: 0, v: 1, name: "E0 (0-1)" },
        { u: 0, v: 2, name: "E1 (0-2)" },
        { u: 1, v: 2, name: "E2 (1-2)" },
        { u: 1, v: 3, name: "E3 (1-3)" },
        { u: 2, v: 3, name: "E4 (2-3)" },
        { u: 2, v: 4, name: "E5 (2-4)" },
        { u: 3, v: 4, name: "E6 (3-4)" },
        { u: 0, v: 4, name: "E7 (0-4)" },
        { u: 3, v: 0, name: "E8 (3-0)" },
        { u: 1, v: 4, name: "E9 (1-4)" }
    ];

    function log(msg, className = "") {
        const out = document.getElementById('outputLog');
        const div = document.createElement('div');
        if (className) div.className = className;
        div.innerHTML = msg;
        out.appendChild(div);
        out.scrollTop = out.scrollHeight;
    }

    function runPathInference() {
        const out = document.getElementById('outputLog');
        out.innerHTML = "";
        const viz = document.getElementById('graphView');
        
        log("[ORACLE] Mapping graph edges to bitmask indices...");
        log("[ORACLE] Sentinel Goal: Visit all 5 nodes exactly once.");

        let currentPath = [];
        let visitedNodes = new Set();
        let finalPathMask = "";

        // Start at Node 0
        let currentNode = 0;
        visitedNodes.add(0);

        // Bit-Peeling through the edges
        for (let i = 0; i < edges.length; i++) {
            let edge = edges[i];
            log(`Testing Edge ${edge.name}...`);

            // LIAR PARADOX LOGIC:
            // 1. Is this edge connected to our current position?
            // 2. Has the target node already been visited?
            let isLiar = false;

            if (edge.u !== currentNode && edge.v !== currentNode) {
                isLiar = true; // Not a liar, just not relevant right now
            } else {
                let neighbor = (edge.u === currentNode) ? edge.v : edge.u;
                if (visitedNodes.has(neighbor)) {
                    isLiar = true; // THIS IS THE PARADOX: Visiting twice breaks the Sentinel.
                }
            }

            if (!isLiar) {
                // Truth Found: Move to the next node
                let neighbor = (edge.u === currentNode) ? edge.v : edge.u;
                currentNode = neighbor;
                visitedNodes.add(neighbor);
                currentPath.push(edge.name);
                finalPathMask = "1" + finalPathMask;
                log(`[PATH ACTIVE] Edge ${edge.name} confirmed.`, "path-active");
            } else {
                finalPathMask = "0" + finalPathMask;
                log(`[PARADOX] Edge ${edge.name} contradicts Hamiltonian constraint.`, "path-inactive");
            }

            if (visitedNodes.size === 5) {
                log("[SENTINEL] All nodes visited. Solution Locked.", "paradox");
                break;
            }
        }

        log(`-------------------------------------------`);
        log(`[VERDICT] Extracted Path Mask: ${finalPathMask.padStart(10, '0')}`, "paradox");
        log(`[RESULT] Path Sequence: ${currentPath.join(" -> ")}`, "path-active");
        viz.innerHTML = `Identified Path: ${currentPath.join(" → ")}`;
    }
</script>

</body>
</html>
