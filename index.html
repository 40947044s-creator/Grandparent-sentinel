<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project NP: Blind Adelic Inference</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .dashboard { background: #111; border: 2px solid var(--neon); padding: 20px; width: 90%; max-width: 900px; box-shadow: 0 0 20px #00ff4133; margin-bottom: 20px; }
        .monitor { display: flex; gap: 15px; width: 95%; height: 400px; margin-bottom: 20px; }
        .panel { flex: 1; border: 1px solid #222; background: #000; padding: 15px; overflow: hidden; position: relative; }
        h2 { font-size: 0.8rem; text-transform: uppercase; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .bitstream { font-size: 0.7rem; word-break: break-all; opacity: 0.5; line-height: 1.1; }
        button { background: var(--neon); color: #000; border: none; padding: 15px 30px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        button:hover { background: #fff; box-shadow: 0 0 15px #fff; }
        #reveal-box { font-size: 1.2rem; display: none; margin-top: 15px; border: 1px solid var(--neon); padding: 15px; background: #001100; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

</body>
</html>
