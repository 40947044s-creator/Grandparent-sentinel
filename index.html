<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adelic Engine | Multi-Prime Multi-Sieve [7, 5, 53]</title>
    <style>
        :root { --neon: #00ff41; --liar: #ff3131; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .dashboard { width: 95%; max-width: 1000px; border: 2px solid var(--neon); padding: 20px; background: #111; box-shadow: 0 0 20px rgba(0,255,65,0.2); }
        .controls { display: flex; gap: 20px; margin-bottom: 20px; background: #001100; padding: 15px; border: 1px solid #222; }
        input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 5px; width: 80px; text-align: center; }
        button { background: var(--neon); color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        /* The One-Stream Pipe */
        .peel-zone { height: 100px; border: 1px solid #333; margin: 20px 0; background: #000; position: relative; overflow: hidden; display: flex; align-items: center; }
        .gate { position: absolute; left: 50%; height: 100%; width: 5px; background: var(--neon); box-shadow: 0 0 15px var(--neon); z-index: 10; }
        .bit { position: absolute; font-weight: bold; transition: all 0.5s linear; }

        .monitor { display: flex; gap: 15px; height: 300px; }
        .panel { flex: 1; border: 1px solid #222; padding: 10px; overflow-y: auto; font-size: 0.7rem; position: relative; }
        .label { font-size: 0.6rem; color: #888; text-transform: uppercase; margin-bottom: 5px; }
        .raf { color: var(--liar); }
    </style>
</head>
<body>

    <header style="text-align: center;">
        <h1 style="letter-spacing: 5px;">ADELIC TRANSITION ENGINE v1.25</h1>
        <p style="opacity: 0.7;">[Knowledge: NP = N &times; P + N] &rarr; [Identity: {7, 5, 53}]</p>
    </header>

    <div class="dashboard">
        <div class="controls">
            <label>Secret N: <input type="number" id="secretN" value="100"></label>
            <label>Revealed P: <input type="number" id="revealedP" value="3"></label>
            <button onclick="triggerSnap()">Execute Snap</button>
            <div style="margin-left: auto;">NP: <b id="uiNP">0</b></div>
        </div>

        <div class="peel-zone" id="pipe">
            <div class="gate"></div>
            <div style="position:absolute; left:51%; top:5px; font-size:0.6rem; color:#888;">MARILYN FOLD (mod 7, 5, 53)</div>
        </div>

        <div class="monitor">
            <div class="panel" id="liarStream"><div class="label">Liar Paradox Signals (RAF)</div></div>
            <div class="panel" id="truthStream"><div class="label">Ground State H (Certain Truth)</div></div>
        </div>

        <div style="margin-top: 20px; border-top: 1px solid #222; padding-top: 10px; display: flex; justify-content: space-around;">
            <div>Inferred Magnitude N: <b id="uiN">0</b></div>
            <div>Complexity: <b id="uiComp">O(Branching)</b></div>
        </div>
    </div>

    <script>
        const P_CONSENSUS = [7, 5, 53];

        async function triggerSnap() {
            const N = parseInt(document.getElementById('secretN').value);
            const P = parseInt(document.getElementById('revealedP').value);
            const NP = N * P + N; //

            document.getElementById('uiNP').innerText = NP;
            document.getElementById('uiComp').innerText = "O(N) [COLLAPSED]";
            document.getElementById('liarStream').innerHTML = '<div class="label">RAF Signals (RAF)</div>';
            document.getElementById('truthStream').innerHTML = '<div class="label">Ground State H</div>';

            const manifold = Array.from({length: N}, () => Math.floor(Math.random() * 256));
            let sieved = 0;

            for (let val of manifold) {
                // Lemma 1: The Liar Paradox as a Grounding Signal
                // Lemma 2: Chinese Prime Consensus (CRT)
                const frictionSignals = P_CONSENSUS.map(p => val % p);
                const totalRAF = frictionSignals.reduce((a, b) => a + b, 0);
                const isLiar = totalRAF > 0;

                animateBit(val, isLiar);

                if (isLiar) {
                    // Execute Boolean Reverse (DPI)
                    document.getElementById('liarStream').innerHTML += `<span class="raf">[RAF:${totalRAF}]</span> `;
                } else {
                    document.getElementById('truthStream').innerHTML += `<span>${val}</span> `;
                }

                sieved++;
                document.getElementById('uiN').innerText = sieved;

                if (N < 500) await new Promise(r => setTimeout(r, 50));
            }
        }

        function animateBit(val, isLiar) {
            const b = document.createElement('div');
            b.className = 'bit';
            b.innerText = val;
            b.style.left = '0%';
            document.getElementById('pipe').appendChild(b);

            setTimeout(() => {
                b.style.left = '50%';
                if (isLiar) b.style.color = 'var(--liar)';
            }, 10);

            setTimeout(() => {
                b.style.left = '100%';
                b.style.opacity = '0';
            }, 400);

            setTimeout(() => b.remove(), 800);
        }
    </script>
</body>
</html>
