<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Grandparent Sentinel Decipher</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; line-height: 1.4; }
        .container { max-width: 900px; margin: auto; border: 1px solid #00ff41; padding: 25px; box-shadow: 0 0 30px #002200; }
        .input-box { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 20px; background: #111; padding: 15px; border: 1px dashed #00ff41; }
        label { display: block; font-size: 0.8em; margin-bottom: 5px; opacity: 0.8; }
        input { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 8px; width: 250px; font-size: 1em; }
        button { background: #00ff41; color: #000; border: none; padding: 12px 30px; cursor: pointer; font-weight: bold; font-size: 1.1em; transition: 0.3s; }
        button:hover { background: #fff; box-shadow: 0 0 20px #fff; }
        .log { background: #000; padding: 15px; height: 450px; overflow-y: scroll; border: 1px solid #333; margin-top: 20px; font-size: 0.85em; border-left: 4px solid #00ff41; }
        .success { color: #ffff00; font-weight: bold; }
        .collision { color: #ff3300; font-style: italic; }
        .bit-one { color: #00ff41; }
        .bit-zero { color: #555; }
        h1 { margin-top: 0; letter-spacing: 2px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h1>7EARTH ORACLE: 60-Bit Deciphering</h1>
    <p>Target Ring: $\mathbb{Z}_{2^{60}}$ | Formula: $NP = (N \times P) + N$</p>
    
    <div class="input-box">
        <div>
            <label>ENTER INVARIANT P (Secret):</label>
            <input type="number" id="secretP" value="123456789">
        </div>
        <div>
            <label>ENTER OPERATOR N (Public):</label>
            <input type="number" id="secretN" value="7">
        </div>
        <button onclick="runDecipher()">INITIATE ATTACK</button>
    </div>

    <div id="outputLog" class="log">
        [SYSTEM ONLINE] Awaiting 2-Adic Parameters...
    </div>
</div>

<script>
    const RING_SIZE = 60n;
    const MODULO = 1n << 60n;

    function log(msg, className = "") {
        const out = document.getElementById('outputLog');
        const div = document.createElement('div');
        if (className) div.className = className;
        div.innerHTML = msg;
        out.appendChild(div);
        out.scrollTop = out.scrollHeight;
    }

    function transition(p, n) {
        return ((p * n) + n) & (MODULO - 1n);
    }

    function runDecipher() {
        const out = document.getElementById('outputLog');
        out.innerHTML = ""; 
        
        const P_input = BigInt(document.getElementById('secretP').value) & (MODULO - 1n);
        const N_input = BigInt(document.getElementById('secretN').value) & (MODULO - 1n);
        
        // Calculate the NP observed by the "world"
        const NP_observed = transition(P_input, N_input);

        log(`[NP ENTER] P: ${P_input} | N: ${N_input}`);
        log(`[NP FORMULATED] Observed NP: ${NP_observed}`);
        log(`[ATTACK] Commencing Bit-by-Bit Deciphering...`);
        log(`--------------------------------------------------`);

        let pGuess = 0n;
        let bitString = "";

        // The Liar Paradox Inference Loop (60 steps)
        for (let k = 0n; k < RING_SIZE; k++) {
            let hypothesis = pGuess | (1n << k);
            let currentModulo = 1n << (k + 1n);

            // Simulate the N*P + N at the current modular scale
            let testVal = ((hypothesis * N_input) + N_input) & (currentModulo - 1n);
            let targetVal = NP_observed & (currentModulo - 1n);

            if (testVal === targetVal) {
                // Consistency found: Bit k is 1
                pGuess = hypothesis;
                bitString = `<span class="bit-one">1</span>` + bitString;
                log(`Bit ${k.toString().padStart(2, '0')}: [1] | Growth: ${bitString}`);
            } else {
                // Paradox detected: Hypothesis k=1 fails, bit must be 0
                bitString = `<span class="bit-zero">0</span>` + bitString;
                log(`Bit ${k.toString().padStart(2, '0')}: [0] | Growth: ${bitString}`);
            }
        }

        log(`--------------------------------------------------`);
        log(`[VERDICT] Final Deciphered P: ${pGuess}`, "success");
        
        if (pGuess !== P_input) {
            log(`[COLLISION] Deciphered P does not match Original. Entropy loss detected via Even N.`, "collision");
        } else {
            log(`[SUCCESS] Unique Invariant Recovered.`, "success");
        }
    }
</script>

</body>
</html>
