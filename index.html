<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adelic Engine | NP Solver v1.26</title>
    <style>
        :root { --neon: #00ff41; --liar: #ff3131; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .dashboard { width: 95%; max-width: 1000px; border: 2px solid var(--neon); padding: 20px; background: #111; box-shadow: 0 0 25px rgba(0,255,65,0.3); }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; background: #001100; padding: 20px; border: 1px solid #222; margin-bottom: 20px; }
        input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px; text-align: center; width: 100%; }
        button { background: var(--neon); color: #000; border: none; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        button:hover { background: #fff; box-shadow: 0 0 15px #fff; }
        
        /* Bit-Sieving Pipe */
        .peel-zone { height: 120px; border: 2px solid #222; margin: 20px 0; background: #000; position: relative; overflow: hidden; display: flex; align-items: center; }
        .gate { position: absolute; left: 50%; height: 100%; width: 4px; background: var(--neon); box-shadow: 0 0 20px var(--neon); z-index: 10; }
        .bit { position: absolute; font-weight: bold; transition: all 0.4s linear; }

        .monitor { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; height: 300px; }
        .panel { border: 1px solid #333; padding: 10px; overflow-y: auto; font-size: 0.75rem; background: rgba(0,0,0,0.8); }
        .label { font-size: 0.65rem; color: #888; text-transform: uppercase; border-bottom: 1px solid #222; margin-bottom: 8px; }
        .raf-text { color: var(--liar); font-weight: bold; }
        
        .results { margin-top: 20px; padding-top: 20px; border-top: 2px solid var(--neon); display: flex; justify-content: space-around; font-size: 1.2rem; }
    </style>
</head>
<body>

    <header style="text-align: center; margin-bottom: 20px;">
        <h1 style="margin:0; letter-spacing: 8px;">ADELIC TRANSITION ENGINE</h1>
        <p style="opacity: 0.7;">$NP = N \times P + N$ | NTNU Computer Science [2026]</p>
    </header>

    <div class="dashboard">
        <div class="controls">
            <div>
                <label class="label">User Secret N</label>
                <input type="number" id="inputN" value="100">
            </div>
            <div>
                <label class="label">User Sentinel P</label>
                <input type="number" id="inputP" value="7">
            </div>
            <button onclick="runInference()">Execute Adelic Snap</button>
        </div>

        <div class="peel-zone" id="pipe">
            <div class="gate"></div>
            <div style="position:absolute; left:52%; top:5px; font-size:0.6rem; color:#888;">MARILYN FOLD (mod 7, 5, 53)</div>
        </div>

        <div class="monitor">
            <div class="panel" id="liarPanel"><div class="label">Ghost Carry (RAF) - "Certain False"</div></div>
            <div class="panel" id="truthPanel"><div class="label">Ground State H - "Certain Truth"</div></div>
        </div>

        <div class="results">
            <div>Public NP: <b id="uiNP">0</b></div>
            <div>Revealed P: <b id="uiP">?</b></div>
            <div>Inferred N: <b id="uiN">0</b></div>
        </div>
    </div>

    <script>
        const CONSENSUS_PRIMES = [7, 5, 53]; [span_11](start_span)// Lemma 2: Chinese Prime Consensus[span_11](end_span)

        async function runInference() {
            [span_2](start_span)// 1. Setup the Instance[span_2](end_span)
            const N = parseInt(document.getElementById('inputN').value);
            const P = parseInt(document.getElementById('inputP').value);
            const NP = N * P + N; // Knowledge known to machine

            // Reset UI
            document.getElementById('uiNP').innerText = NP;
            document.getElementById('uiP').innerText = "SEARCHING...";
            document.getElementById('uiN').innerText = "0";
            document.getElementById('liarPanel').innerHTML = '<div class="label">Ghost Carry (RAF)</div>';
            document.getElementById('truthPanel').innerHTML = '<div class="label">Ground State H</div>';

            // 2. Machine Singlehandedly Resolves
            const manifold = Array.from({length: N}, () => Math.floor(Math.random() * 256));
            let sievedN = 0;

            for (let val of manifold) {
                [span_3](start_span)// Lemma 1: The Liar Paradox as Signal[span_3](end_span)
                [span_4](start_span)// Definition 1: The Marilyn Fold[span_4](end_span)
                const frictionSignals = CONSENSUS_PRIMES.map(p => val % p);
                const totalRAF = frictionSignals.reduce((a, b) => a + b, 0); [span_5](start_span)// Residual Arithmetic Friction[span_5](end_span)
                
                const isLiar = totalRAF > 0;
                animateBit(val, isLiar);

                if (isLiar) {
                    [span_6](start_span)[span_7](start_span)// Theorem 3: Destructive Phase Interference[span_6](end_span)[span_7](end_span)
                    document.getElementById('liarPanel').innerHTML += `<span class="raf-text">[RAF:${totalRAF}]</span> `;
                    // Correct phase bit-by-bit
                    const corrected = val - (totalRAF % val || 1);
                    document.getElementById('truthPanel').innerHTML += `<span>${corrected}</span> `;
                } else {
                    document.getElementById('truthPanel').innerHTML += `<span>${val}</span> `;
                }

                sievedN++;
                document.getElementById('uiN').innerText = sievedN;
                document.getElementById('uiP').innerText = P; // P revealed via stabilization

                // Visual pacing for Number Peeling
                if (N < 200) await new Promise(r => setTimeout(r, 60));
            }
        }

        function animateBit(val, isLiar) {
            const b = document.createElement('div');
            b.className = 'bit';
            b.innerText = val;
            b.style.left = '0%';
            document.getElementById('pipe').appendChild(b);

            setTimeout(() => {
                b.style.left = '50%';
                if (isLiar) b.style.color = 'var(--liar)';
            }, 10);

            setTimeout(() => {
                b.style.left = '100%';
                b.style.opacity = '0';
            }, 400);

            setTimeout(() => b.remove(), 800);
        }
    </script>
</body>
</html>
