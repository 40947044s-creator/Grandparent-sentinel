<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Grandparent Sentinel Demo</title>
    <style>
        body { background: #0a0a0a; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; }
        .container { max-width: 800px; margin: auto; border: 1px solid #00ff41; padding: 20px; box-shadow: 0 0 20px #003300; }
        input { background: #000; color: #00ff41; border: 1px solid #00ff41; padding: 5px; margin: 5px; width: 200px; }
        button { background: #00ff41; color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #00cc33; }
        .log { background: #111; padding: 10px; height: 300px; overflow-y: scroll; border: 1px solid #333; margin-top: 20px; font-size: 0.9em; }
        .success { color: #ffff00; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>7EARTH ORACLE: Extraction Demo</h1>
    <p>Target Ring: $\mathbb{Z}_{2^{60}}$ | Logic: Liar Paradox Attack</p>
    
    <div class="input-group">
        <label>Enter Secret P:</label><br>
        <input type="number" id="secretP" value="123456789">
        <button onclick="runDemo()">Run Extraction</button>
    </div>

    <div id="outputLog" class="log">
        [SYSTEM READY] Awaiting NP Entry...
    </div>
</div>

<script>
    // Configuration for 2^60
    const RING_SIZE = 60n;
    const MODULO = 1n << 60n;
    const MSB_MASK = 1n << 59n;

    function log(msg, isSuccess = false) {
        const out = document.getElementById('outputLog');
        const span = document.createElement('div');
        if (isSuccess) span.className = 'success';
        span.innerText = msg;
        out.appendChild(span);
        out.scrollTop = out.scrollHeight;
    }

    // --- PROJECT NP: DECIPHERING MODE ---

function transition(p, n) {
    // Formula: NP = N*P + N
    return ((p * n) + n) & (MODULO - 1n);
}

function runDemo() {
    const out = document.getElementById('outputLog');
    out.innerHTML = ""; 
    
    const secretP = BigInt(document.getElementById('secretP').value);
    const inputs = [7n, 13n, 25n]; // Using primes for N ensures they are units (odd)
    const pairs = inputs.map(n => ({ n, delta: transition(secretP, n) }));

    log(`[NP ENTER] Formula: N*P + N | Secret P: ${secretP}`);
    log(`[DATA] Deciphering with ${pairs.length} observation pairs...`);

    let pGuess = 0n;

    // Recursive Deciphering Loop
    for (let k = 0n; k < RING_SIZE; k++) {
        let hypothesis = pGuess | (1n << k);
        let bitIsLiar = false;
        let currentModulo = 1n << (k + 1n);

        for (let pair of pairs) {
            // Re-simulate the N*P + N at the current modular scale
            let testVal = ((hypothesis * pair.n) + pair.n) & (currentModulo - 1n);
            let observedVal = pair.delta & (currentModulo - 1n);

            if (testVal !== observedVal) {
                bitIsLiar = true;
                break;
            }
        }

        if (bitIsLiar) {
            // Paradox detected: If bit k=1 fails, it must be 0
            // We do not change pGuess (bit k remains 0)
        } else {
            // Consistency found: Bit k is 1
            pGuess = hypothesis;
        }
    }

    log(`-----------------------------------`);
    log(`[VERDICT] Deciphered P: ${pGuess}`, true);
    log(`[STATUS] 2-Adic Limit Reached.`, true);
}

    
</script>

</body>
</html>
