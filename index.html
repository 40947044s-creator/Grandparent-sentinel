<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adelic Engine: Bit-Level Inference</title>
    <style>
        :root { --neon: #00ff41; --liar: #ff3131; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; padding: 20px; }
        .sieve-pipe { width: 90%; height: 60px; border: 2px solid #222; margin: 20px 0; position: relative; overflow: hidden; background: #000; }
        .bit { position: absolute; top: 15px; font-weight: bold; transition: all 0.6s linear; }
        .sentinel-gate { position: absolute; left: 50%; height: 100%; width: 4px; background: var(--neon); box-shadow: 0 0 15px var(--neon); z-index: 10; }
        .label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        .monitor { display: flex; gap: 20px; width: 95%; height: 300px; }
        .panel { flex: 1; border: 1px solid #333; padding: 10px; overflow-y: auto; font-size: 0.75rem; }
    </style>
</head>
<body>

    <h2>Marilyn-Adelic Consensus Solver [NP = N × P + N]</h2>
    
    <div class="sieve-pipe" id="pipe">
        <div class="sentinel-gate"></div>
        <div style="position: absolute; left: 51%; top: 2px; font-size: 0.6rem;">MARILYN FOLD (mod Mp)</div>
    </div>

    <div class="monitor">
        <div class="panel" id="raf-panel">
            <div class="label">RAF Signals (Certain False)</div>
        </div>
        <div class="panel" id="ground-panel">
            <div class="label">Ground State H (Certain Truth)</div>
        </div>
    </div>

    <script>
        // Foundational Parameters
        const P_SENTINEL = 3; // M2 Mersenne Sentinel
        const SECRET_N = 50;  
        const NP_KNOWLEDGE = (SECRET_N * P_SENTINEL) + SECRET_N;

        async function inferBitstream() {
            const pipe = document.getElementById('pipe');
            const rafPanel = document.getElementById('raf-panel');
            const groundPanel = document.getElementById('ground-panel');

            for (let i = 0; i < SECRET_N; i++) {
                // Generate state transition
                const val = Math.floor(Math.random() * 10);
                const bit = document.createElement('div');
                bit.className = 'bit';
                bit.innerText = val;
                bit.style.left = '0%';
                pipe.appendChild(bit);

                // Start Waveeve (W) propagation
                setTimeout(() => {
                    bit.style.left = '50%';
                    
                    // Apply Marilyn Fold: R ≡ H (mod Mp)
                    const raf = val % P_SENTINEL;
                    
                    if (raf !== 0) {
                        // Lemma 1: Identify "Certain False"
                        bit.style.color = 'var(--liar)';
                        rafPanel.innerHTML += `<div>[RAF DETECTED: ${val} mod ${P_SENTINEL} = ${raf}]</div>`;
                        
                        // Execute Boolean Reverse (DPI)
                        setTimeout(() => {
                            bit.style.left = '100%';
                            bit.style.opacity = '0';
                            groundPanel.innerHTML += `<div style="color:var(--neon)">CRYSTALLIZED: ${val - raf}</div>`;
                        }, 300);
                    } else {
                        // Certain Truth detected
                        bit.style.left = '100%';
                        bit.style.opacity = '0';
                        groundPanel.innerHTML += `<div>STABLE H: ${val}</div>`;
                    }
                }, 100);

                await new Promise(r => setTimeout(r, 400));
            }
        }
        inferBitstream();
    </script>
</body>
</html>
