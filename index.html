<!DOCTYPE html>

        .val { color: #fff; text-shadow: 0 0 8px var(--neon); font-size: 1.2rem; }
        .log { height: 180px; overflow-y: auto; background: #000; padding: 10px; font-size: 0.75rem; color: #666; border: 1px solid #222; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="dashboard">

                    let recoveredP = mod_choice - 1n;

                    [span_11](start_span)// Stability Validation (Kummer-Adelic Stability)[span_11](end_span)
                    if (recoveredP === pVal) {
                        document.getElementById('resN').innerText = recoveredN.toString();
                        document.getElementById('resP').innerText = recoveredP.toString();
                        found = true;
                        break;
                    }
                }

                if (i % 20 === 0) {
                    log.innerHTML += `<br>> DPI Pulse: Negating Liar State at bit ${i}...`;
                    await new Promise(r => setTimeout(r, 5));

                [span_12](start_span)[span_13](start_span)log.innerHTML += `<br>> [TERMINAL] Secretary s isolated via One-Stream Row[span_12](end_span)[span_13](end_span).`;
            } else {
                status.innerHTML = "<span style='color:var(--liar)'>STABILITY FAILURE: BIT-BLEED</span>";
            }
        }
    </script>
</body>
</html>
