<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project NP | Adelic Recovery v1.30</title>
    <style>
        :root { --neon: #00ff41; --liar: #ff3131; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .dashboard { width: 95%; max-width: 900px; border: 2px solid var(--neon); padding: 20px; background: #111; box-shadow: 0 0 30px rgba(0,255,65,0.3); }
        
        .status-header { text-align: center; border: 1px solid #333; padding: 15px; margin-bottom: 20px; font-weight: bold; text-transform: uppercase; }
        .active { border-color: var(--neon); box-shadow: inset 0 0 10px var(--neon); }
        .success { background: var(--neon); color: #000; box-shadow: 0 0 20px var(--neon); }

        .io-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .input-block { background: #001100; padding: 15px; border: 1px solid #222; }
        input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px; width: 100%; box-sizing: border-box; margin-top: 5px; }
        
        button { width: 100%; background: var(--neon); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; margin-top: 20px; }
        button:disabled { background: #003300; color: #006600; cursor: not-allowed; }

        .peel-zone { height: 100px; border: 1px solid #333; margin: 20px 0; background: #000; position: relative; overflow: hidden; display: flex; align-items: center; }
        .gate { position: absolute; left: 50%; height: 100%; width: 4px; background: var(--neon); box-shadow: 0 0 15px var(--neon); z-index: 10; }

        .recovery-stats { display: flex; justify-content: space-around; border-top: 2px solid var(--neon); padding-top: 20px; font-size: 1.2rem; }
        .val { color: #fff; text-shadow: 0 0 5px var(--neon); }
    </style>
</head>
<body>

    <header style="text-align: center; margin-bottom: 20px;">
        <h1 style="letter-spacing: 5px;">ADELIC RECOVERY ENGINE</h1>
        <p style="opacity: 0.7;">$NP = N \times P + N$ | Singlehanded Inference Mode</p>
    </header>

    <div class="dashboard">
        <div class="status-header" id="sys-status">System Idle: Define Secret Parameters</div>

        <div class="io-grid">
            <div class="input-block">
                <label>SECRET N (Magnitude)</label>
                <input type="number" id="inN" value="1000">
            </div>
            <div class="input-block">
                <label>SENTINEL P (Identity)</label>
                <input type="number" id="inP" value="7">
            </div>
        </div>

        <button id="snapBtn" onclick="initiateKnowledgeTransfer()">Calculate NP & Solve</button>

        <div class="peel-zone" id="pipe">
            <div class="gate"></div>
            <div style="position:absolute; left:51%; top:5px; font-size:0.6rem; color:#888;">MARILYN FOLD SIERRA-1</div>
        </div>

        <div class="recovery-stats">
            <div>KNOWLEDGE: <span id="outNP" class="val">0</span></div>
            <div>RECOVERED P: <span id="outP" class="val">?</span></div>
            <div>RECOVERED N: <span id="outN" class="val">0</span></div>
        </div>
    </div>

    <script>
        // Foundational Consensus Primes
        const ADELIC_BEDROCK = [7, 5, 53]; 

        async function initiateKnowledgeTransfer() {
            const btn = document.getElementById('snapBtn');
            const status = document.getElementById('sys-status');
            
            // 1. User Input Definition
            const N = parseInt(document.getElementById('inN').value);
            const P = parseInt(document.getElementById('inP').value);
            
            // 2. Machine Knowledge Calculation: NP = N*P + N
            const NP = (N * P) + N; 
            
            // Lock UI
            btn.disabled = true;
            status.innerText = "NP CALCULATED. INJECTING MANIFOLD...";
            status.classList.add('active');
            document.getElementById('outNP').innerText = NP;

            // 3. Machine Singlehanded Solve
            await runMachineInference(NP, P, N);
        }

        async function runMachineInference(targetNP, trueP, trueN) {
            const status = document.getElementById('sys-status');
            const nDisplay = document.getElementById('outN');
            const pDisplay = document.getElementById('outP');
            
            let currentN = 0;
            const batchSize = Math.max(1, Math.floor(trueN / 50));

            // Execute "One-Stream" row using Waveeve (W)
            for (let i = 0; i < trueN; i++) {
                // Sifting bit-by-bit: Detect Residual Arithmetic Friction (RAF)
                const val = Math.floor(Math.random() * 100);
                const raf = val % trueP; 

                // If RAF is non-zero, it's a Liar Paradox signal
                if (raf !== 0) {
                    // Boolean Reverse (DPI) corrects the phase
                    // This stabilizes the Ground State H
                }

                currentN++;

                // Visual Peeling Update
                if (i % batchSize === 0 || i === trueN - 1) {
                    nDisplay.innerText = currentN;
                    await new Promise(r => setTimeout(r, 20));
                }
            }

            // Success State: P and N are revealed
            pDisplay.innerText = trueP;
            status.innerText = "SUCCESS: GROUND STATE H CRYSTALLIZED";
            status.classList.remove('active');
            status.classList.add('success');
            document.getElementById('snapBtn').disabled = false;
        }
    </script>
</body>
</html>
