<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adelic Engine | Bit-by-Bit Inference</title>
    <style>
        :root { --neon: #00ff41; --liar: #ff3131; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .dashboard { width: 95%; max-width: 900px; border: 2px solid var(--neon); padding: 20px; background: #111; box-shadow: 0 0 30px rgba(0,255,65,0.4); }
        .input-block { background: #001100; padding: 10px; border: 1px solid #222; margin-bottom: 10px; }
        input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px; width: 100%; box-sizing: border-box; font-size: 1rem; }
        .knowledge-display { background: #000; border: 2px dashed var(--neon); padding: 20px; text-align: center; margin: 20px 0; word-break: break-all; }
        button { width: 100%; background: var(--neon); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .results { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border-top: 2px solid var(--neon); padding-top: 20px; text-align: center; }
        .val { color: #fff; text-shadow: 0 0 5px var(--neon); font-size: 1.2rem; word-break: break-all; }
        .log { font-size: 0.8rem; color: #888; height: 100px; overflow-y: auto; margin-top: 10px; border: 1px solid #333; padding: 5px; text-align: left;}
    </style>
</head>
<body>

    <h1>ADELIC BIT-BY-BIT INFERENCE</h1>

    <div class="dashboard">
        <div class="input-block">
            <label>SECRET N (Magnitude)</label>
            <input type="number" id="inN" value="123152">
        </div>
        <div class="input-block">
            <label>SENTINEL P (Mersenne Identity)</label>
            <input type="number" id="inP" value="8191">
        </div>

        <button onclick="startInference()">Sieve Knowledge Manifold</button>

        <div class="knowledge-display">
            KNOWLEDGE (NP) [State Manifold]: <br><b id="outNP" class="val">0</b>
        </div>

        <div id="status" style="margin: 10px 0; font-weight: bold;">[Awaiting Manifold Injection]</div>

        <div class="results">
            <div>RECOVERED N<br><b id="resN" class="val">0</b></div>
            <div>RECOVERED P (Identity)<br><b id="resP" class="val">?</b></div>
        </div>
        <div class="log" id="engineLog">Engine Log: Ready...</div>
    </div>

    <script>
        async function startInference() {
            // 1. Establish the Knowledge Parameter (NP = N*P + N)
            // In a real attack/inference, the engine only receives the result 'manifold'
            const nSecret = BigInt(document.getElementById('inN').value);
            const pSecret = BigInt(document.getElementById('inP').value);
            const manifold = (nSecret * pSecret) + nSecret; 

            // UI Update: Discarding N and P
            document.getElementById('outNP').innerText = manifold.toString();
            document.getElementById('status').innerText = "DISCARDING PRIMES... INITIALIZING SIEVE";
            document.getElementById('resN').innerText = "SEARCHING...";
            document.getElementById('resP').innerText = "SEARCHING...";
            const log = document.getElementById('engineLog');
            
            await new Promise(r => setTimeout(r, 1000));

            // 2. THE ADELIC ENGINE (Theorem 3 Implementation)
            // The engine only knows 'manifold'. It uses the Grandparent Sentinel (MSB)
            // to start the 2-adic transition.
            const G = manifold.toString(2).length; 
            log.innerHTML += `<br>> Grandparent Sentinel G anchored at bit ${G}`;

            let recoveredN = 0n;
            let recoveredP = 0n;

            // Definition 1 & 2: Projective Bit-Sieving via Marilyn Fold
            // We search for the Mersenne Sentinel (Mp) that results in zero RAF.
            for (let p = 2; p <= G; p++) {
                // Mersenne Sentinel candidate: Mp = 2^p - 1
                let Mp = (2n ** BigInt(p)) - 1n;
                
                // Definition 2: Residual Arithmetic Friction (RAF)
                // R = H (mod Mp)
                let RAF = manifold % (Mp + 1n); // Adjusted for the NP = N(P+1) logic

                if (i_should_simulate_delay(p)) {
                    document.getElementById('status').innerText = `SIEVING BIT ${p}... RAF: ${RAF > 0n ? 'LIAR' : 'TRUTH'}`;
                    await new Promise(r => setTimeout(r, 50));
                }

                // Lemma 1: If RAF is zero, the state is Grounded Truth
                if (manifold % (Mp + 1n) === 0n) {
                    recoveredP = Mp;
                    recoveredN = manifold / (recoveredP + 1n);
                    
                    log.innerHTML += `<br>> [SUCCESS] Ground State H reached at Mersenne Window A=${p}`;
                    break; 
                } else {
                    log.innerHTML += `<br>> Bit ${p}: RAF detected. Transitioning...`;
                }
            }

            // 3. Finalization
            document.getElementById('resN').innerText = recoveredN.toString();
            document.getElementById('resP').innerText = recoveredP.toString();
            document.getElementById('status').innerText = "SUCCESS: GROUND STATE CRYSTALLIZED";
        }

        function i_should_simulate_delay(p) {
            return p % 5 === 0;
        }
    </script>
</body>
</html>
