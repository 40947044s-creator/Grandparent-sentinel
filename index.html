<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adelic Engine | Bit-by-Bit Inference</title>
    <style>
        :root { --neon: #00ff41; --liar: #ff3131; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .dashboard { width: 95%; max-width: 900px; border: 2px solid var(--neon); padding: 20px; background: #111; box-shadow: 0 0 30px rgba(0,255,65,0.4); }
        .input-block { background: #001100; padding: 10px; border: 1px solid #222; margin-bottom: 10px; }
        input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px; width: 100%; box-sizing: border-box; font-size: 1rem; }
        .knowledge-display { background: #000; border: 2px dashed var(--neon); padding: 20px; text-align: center; margin: 20px 0; word-break: break-all; }
        button { width: 100%; background: var(--neon); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .results { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; border-top: 2px solid var(--neon); padding-top: 20px; text-align: center; }
        .val { color: #fff; text-shadow: 0 0 5px var(--neon); font-size: 1.2rem; word-break: break-all; }
    </style>
</head>
<body>

    <h1>ADELIC BIT-BY-BIT INFERENCE</h1>

    <div class="dashboard">
        <div class="input-block">
            <label>SECRET N (Magnitude)</label>
            <input type="text" id="inN" value="123152">
        </div>
        <div class="input-block">

        <button onclick="startInference()">Sieve Knowledge Manifold</button>

        <div class="knowledge-display">
            KNOWLEDGE (NP): <br><b id="outNP" class="val">0</b>
        </div>

        <div id="status" style="margin: 10px 0; font-weight: bold;">[Awaiting Manifold Injection]</div>

        <div class="results">
            <div>RECOVERED N<br><b id="resN" class="val">0</b></div>
            <div>RECOVERED P (Identity)<br><b id="resP" class="val">?</b></div>
        </div>
    </div>

            document.getElementById('resN').innerText = "0";
            document.getElementById('resP').innerText = "SEARCHING...";

    </script>
</body>
</html>
