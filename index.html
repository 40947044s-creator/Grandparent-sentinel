<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project NP: Base 3 Number Peeling</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .dashboard { background: #111; border: 2px solid var(--neon); padding: 20px; width: 95%; max-width: 1000px; box-shadow: 0 0 20px #00ff4133; }
        .controls { display: flex; gap: 20px; margin-bottom: 20px; align-items: center; justify-content: center; background: #001100; padding: 15px; }
        input { background: #000; border: 1px solid var(--neon); color: var(--neon); padding: 8px; width: 80px; text-align: center; }
        button { background: var(--neon); color: #000; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .monitor { display: flex; gap: 15px; height: 350px; margin-bottom: 15px; }
        .panel { flex: 1; border: 1px solid #222; background: #000; padding: 10px; overflow: hidden; position: relative; }
        .stream { font-size: 0.7rem; word-break: break-all; opacity: 0.6; height: 100%; }
        #status-reveal { font-size: 1.2rem; border-top: 1px solid var(--neon); padding-top: 15px; text-align: center; }
        .highlight { color: #fff; text-shadow: 0 0 5px var(--neon); }
    </style>
</head>
<body>

    <header>
        <h1>ADELIC SNAP ENGINE: BASE 3</h1>
        <p>[Inference Law: NP = N &times; P + N]</p>
    </header>

    <div class="dashboard">
        <div class="controls">
            <label>Secret N:</label>
            <input type="number" id="inputN" value="1000">
            <label>Sentinel P:</label>
            <input type="number" id="inputP" value="3">
            <button onclick="startPeeling()">Execute Peel</button>
        </div>

        <div class="monitor">
            <div class="panel">
                <h2>NP Manifold (Public Knowledge)</h2>
                <div id="npStream" class="stream"></div>
            </div>
            <div class="panel">
                <h2>Peeling Process (Bit-by-Bit Inference)</h2>
                <div id="peelStream" class="stream"></div>
            </div>
        </div>

        <div id="status-reveal">
            Calculated NP: <span id="calcNP" class="highlight">0</span> | 
            Inferred N: <span id="revealN" class="highlight">0</span> / <span id="targetN">0</span>
        </div>
    </div>

    <script>
        let isPeeling = false;

        async function startPeeling() {
            if (isPeeling) return;
            isPeeling = true;

            const N = parseInt(document.getElementById('inputN').value);
            const P = parseInt(document.getElementById('inputP').value);
            const NP = N * P + N; [span_3](start_span)// The Knowledge Manifold[span_3](end_span)

            document.getElementById('calcNP').innerText = NP.toLocaleString();
            document.getElementById('targetN').innerText = N.toLocaleString();
            document.getElementById('revealN').innerText = "0";
            document.getElementById('peelStream').innerText = "";

            [span_4](start_span)// 1. Generate unordered manifold (The Liar State)[span_4](end_span)
            const manifold = new Int32Array(N);
            for(let i=0; i < N; i++) manifold[i] = Math.floor(Math.random() * (P + 10));
            document.getElementById('npStream').innerText = manifold.slice(0, 1000).join(' ');

            [span_5](start_span)// 2. Number Peeling: Bit-by-Bit Inference[span_5](end_span)
            [span_6](start_span)// We use P=3 as the Modulo 3 Marilyn Fold[span_6](end_span)
            const bedrock = new Map();
            let inferredCounter = 0;

            for (let i = 0; i < N; i++) {
                const val = manifold[i];
                const raf = val % P; [span_7](start_span)[span_8](start_span)// Identify Residual Arithmetic Friction[span_7](end_span)[span_8](end_span)

                // Sifting the signal bit-by-bit
                if (raf !== 0) {
                    [span_9](start_span)[span_10](start_span)// Logic: Negate Liar state to reach Ground State H[span_9](end_span)[span_10](end_span)
                    bedrock.set(val, (bedrock.get(val) || 0) + 1);
                }
                
                inferredCounter++;

                // Visual Reveal (Sampled to prevent UI lag)
                if (i % Math.ceil(N/100) === 0 || i === N - 1) {
                    document.getElementById('revealN').innerText = inferredCounter.toLocaleString();
                    document.getElementById('peelStream').innerText += `[Peel ${i}: RAF=${raf}] `;
                    await new Promise(r => setTimeout(r, 10)); // Visualize the "Click"
                }
            }

            document.getElementById('status-reveal').innerHTML += "<br><b style='color:white'>CONSENSUS REACHED: MANIFOLD CRYSTALLIZED</b>";
            isPeeling = false;
        }
    </script>
</body>
</html>
