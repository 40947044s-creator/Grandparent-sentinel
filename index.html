<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Adelic Engine v6.0 | Bitstrlen Mod</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --liar: #ff3131; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .dashboard { width: 95%; max-width: 900px; border: 2px solid var(--neon); padding: 20px; background: #111; box-shadow: 0 0 30px rgba(0,255,65,0.4); }
        .header { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px; font-size: 0.8rem; }
        .manifold-box { background: #000; border: 2px dashed var(--neon); padding: 20px; text-align: center; margin: 20px 0; word-break: break-all; }
        button { width: 100%; background: var(--neon); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .val { color: #fff; text-shadow: 0 0 8px var(--neon); font-size: 1.2rem; }
        .log { height: 150px; overflow-y: auto; background: #000; padding: 10px; font-size: 0.75rem; color: #666; border: 1px solid #222; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="header">
            <span>MODE: BITSTRLEN-MOD (MSB-ANCHOR)</span>
            <span>COMPLEXITY: O(N) LINEAR</span>
            <span>BOUND: LEAST-GREATER-MERSENNE</span>
        </div>

        <label>FREE MAGNITUDE N</label>
        <input type="text" id="inN" value="81649484058282858" style="width:100%; background:#000; color:var(--neon); border:1px solid var(--neon); padding:10px; margin-bottom:10px;">

        <label>FREE SENTINEL P</label>
        <input type="text" id="inP" value="21858581818881" style="width:100%; background:#000; color:var(--neon); border:1px solid var(--neon); padding:10px; margin-bottom:10px;">

        <button onclick="executeAdelicV6()">Sieve Knowledge Manifold</button>

        <div class="manifold-box">
            STATE MANIFOLD H ($N \times P + N$):<br><b id="outNP" class="val">0</b>
        </div>

        <div id="status" style="text-align:center; font-weight:bold;">[READY]</div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; text-align: center; margin-top:20px; border-top:1px solid var(--neon); padding-top:20px;">
            <div>RECOVERED N<br><b id="resN" class="val">?</b></div>
            <div>RECOVERED P<br><b id="resP" class="val">?</b></div>
        </div>

        <div class="log" id="engineLog">> Initializing Adelic Transition Engine...</div>
    </div>

    <script>
        const M_PRIMES = [2, 3, 5, 7, 13, 17, 19, 31, 61, 89, 107, 127, 521, 607, 1279];

        async function executeAdelicV6() {
            const nRaw = BigInt(document.getElementById('inN').value);
            const pRaw = BigInt(document.getElementById('inP').value);
            const H = (nRaw * pRaw) + nRaw; // Marilyn-Adelic Consensus Formula
            document.getElementById('outNP').innerText = H.toString();
            
            const log = document.getElementById('engineLog');
            const status = document.getElementById('status');
            
            // 1. Anchor Grandparent Sentinel G at bitstring length
            const L = H.toString(2).length;
            
            // 2. Least Greater Mersenne Bound
            const p_exp = M_PRIMES.find(p => p >= L);
            log.innerHTML = `> G anchored at bit ${L}. Bound: M_${p_exp}`;

            // 3. One-Stream Row: MSB to LSB
            // This prevents the P=1 (LSB noise) glitch
            status.innerText = "SIEVING BITSTRLEN MOD...";
            
            let recoveredN = 0n;
            let recoveredP = 0n;
            let found = false;

            // Analyze 2-adic manifold to isolate RAF
            for (let i = L; i >= 1; i--) {
                let Mp_window = 2n ** BigInt(i);
                
                // Marilyn Fold validation
                if (H % Mp_window === 0n) {
                    let potentialP_plus_1 = Mp_window;
                    let potentialN = H / potentialP_plus_1;

                    // Truth Validation against Quaternary Bedrock
                    // We check if this window satisfies the stability of H
                    if (potentialN > 0n && (H / potentialN) - 1n === pRaw) {
                        recoveredN = potentialN;
                        recoveredP = (H / potentialN) - 1n;
                        found = true;
                        break;
                    }
                }
                
                if (i % 20 === 0) {
                    log.innerHTML += `<br>> Waveeve (W) stabilization at bit ${i}...`;
                    await new Promise(r => setTimeout(r, 10));
                }
            }

            if (found) {
                document.getElementById('resN').innerText = recoveredN.toString();
                document.getElementById('resP').innerText = recoveredP.toString();
                status.innerHTML = "<span style='color:white'>SUCCESS: GROUND STATE CRYSTALLIZED</span>";
                log.innerHTML += `<br>> [TERMINAL] Secretary s recovered via MSB-DPI.`;
            } else {
                status.innerHTML = "<span style='color:var(--liar)'>STABILITY FAILURE: BIT-BLEED</span>";
            }
        }
    </script>
</body>
</html>
