<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>O-MAX: Non-Overlapping Adelic Chain</title>
    <style>
        :root { --neon: #00ff41; --bg: #030303; --gold: #f1c40f; --blue: #00d4ff; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .manifold-shell { border: 1px solid var(--neon); background: #000; width: 98%; max-width: 1100px; padding: 25px; box-shadow: 0 0 40px rgba(0,255,65,0.05); }
        .header { text-align: center; color: var(--gold); letter-spacing: 6px; font-weight: bold; margin-bottom: 20px; }
        textarea { background: #050505; color: var(--blue); border: 1px solid #111; width: 100%; height: 80px; padding: 10px; font-family: monospace; outline: none; margin-bottom: 15px; }
        .annihilation-log { height: 450px; overflow-y: auto; background: #000; border: 1px solid #111; padding: 15px; font-size: 0.9em; }
        .ac-block { border-left: 2px solid var(--neon); padding-left: 15px; margin-bottom: 10px; background: rgba(0,255,65,0.01); display: flex; justify-content: space-between; align-items: center; }
        button { background: transparent; color: var(--neon); border: 1px solid var(--neon); padding: 15px; width: 100%; cursor: pointer; font-weight: bold; letter-spacing: 5px; }
        button:hover { background: var(--neon); color: #000; }
        .val { color: #fff; word-break: break-all; font-weight: bold; }
        .label { color: #555; font-size: 0.7em; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="manifold-shell">
    <div class="header">SYSTEM O-MAX: NON-OVERLAPPING SINGULARITIES</div>

    <div style="display:flex; justify-content:space-between; font-size:0.7em; color:#444; margin-bottom:10px;">
        <span>BASE: 2-ADIC QUATERNARY</span>
        <span>HORIZON: SQRT(R)</span>
        <span>LOGIC: AC-INFERENCE</span>
    </div>

    <textarea id="manifoldInput" placeholder="INPUT ARBITRARY INT (SKY-LIMIT STRING)...">35000</textarea>
    
    <button onclick="executeNonOverlappingScan()">RESOLVE ADELIC CHAIN</button>

    <div id="log" class="annihilation-log">
        <div style="color:#333;">// Awaiting Singularity Input...</div>
    </div>
</div>

<script>
    /**
     * NON-OVERLAPPING ADELIC SCAN
     * Outputs pairs (P, N) where P * N = R and P <= N.
     */
    async function executeNonOverlappingScan() {
        const input = document.getElementById('manifoldInput').value.replace(/\s/g, '');
        const log = document.getElementById('log');
        if (!input) return;

        log.innerHTML = "<div style='color:var(--gold)'>[COLLAPSING MANIFOLD HORIZON]</div>";
        let R = BigInt(input);
        let foundCount = 0;

        // THE AC-INFERENCE CHAIN
        // We scan for P (Singularity) up to the square root of R to avoid overlap.
        // For 900-digit numbers, we focus on the Adelic harmonics.
        for (let P = 1n; P * P <= R; P++) {
            // MARILYN FOLD: Does the input R resonate with harmonic P?
            if (R % P === 0n) {
                let N = R / P; // The Inferred Pair
                foundCount++;

                const div = document.createElement('div');
                div.className = 'ac-block';
                div.innerHTML = `
                    <div>
                        <span class="label">Pair ${foundCount} [AC]</span><br>
                        P: <span class="val">${P}</span>
                    </div>
                    <div style="text-align:right">
                        <span class="label">Inferred N</span><br>
                        N: <span class="val">${N}</span>
                    </div>
                `;
                log.prepend(div);
            }

            // Yield to hardware to handle arbitrary "Sky-Limit" lengths
            if (P % 10000n === 0n) {
                await new Promise(r => setTimeout(r, 0));
            }
            
            // Safety: Trivial Test limit for browser performance
            if (foundCount > 1000) break; 
        }

        const div = document.createElement('div');
        div.style.color = "var(--gold)";
        div.style.marginTop = "10px";
        div.innerText = `[SUCCESS] ${foundCount} Non-Overlapping AC States Crystallized.`;
        log.prepend(div);
    }
</script>
</body>
</html>
