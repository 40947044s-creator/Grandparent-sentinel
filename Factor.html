<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AC-Terminal | Inter-Factor Verification</title>
    <style>
        :root {
            --ac-green: #00ff9d;
            --dpi-red: #ff3e3e;
            --void-bg: #020202;
            --term-text: #00ff41;
            --status-blue: #00d4ff;
        }

        body {
            background: var(--void-bg);
            color: #ccc;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .engine-frame {
            border: 2px solid var(--ac-green);
            width: 95%;
            max-width: 1000px;
            padding: 20px;
            background: rgba(0,0,0,0.9);
            box-shadow: 0 0 40px rgba(0, 255, 157, 0.1);
        }

        .display-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }

        #terminal {
            background: #000;
            height: 400px;
            overflow-y: auto;
            border: 1px solid #222;
            padding: 15px;
            font-size: 0.85rem;
            line-height: 1.5;
            color: var(--term-text);
            word-break: break-all;
        }

        canvas {
            border: 1px solid var(--ac-green);
            background: radial-gradient(circle, #0a0a0a 0%, #000 100%);
            width: 100%;
        }

        .controls {
            display: flex;
            gap: 15px;
            background: #111;
            padding: 15px;
            justify-content: center;
            flex-wrap: wrap;
            border-radius: 4px;
        }

        input {
            background: #000;
            border: 1px solid var(--ac-green);
            color: var(--ac-green);
            padding: 8px;
            width: 150px;
            outline: none;
        }

        button {
            background: var(--ac-green);
            color: black;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        button:hover { filter: brightness(1.2); }

        .psi-box {
            font-size: 1.5rem;
            text-align: center;
            margin-top: 10px;
            color: var(--ac-green);
            border: 1px dashed #333;
            padding: 10px;
        }

        .status-msg { font-weight: bold; margin-top: 10px; display: block; }
        .success { color: var(--ac-green); }
        .stable { color: var(--status-blue); }
        .excited { color: var(--dpi-red); }
    </style>
</head>
<body>

<div class="engine-frame">
    <div style="border-bottom: 1px solid var(--ac-green); padding-bottom: 10px;">
        <strong>INTER-FACTOR VERIFICATION // END GAME LOGIC</strong><br>
        <small>Universal Grounding | Statistical Walk Limit Implementation</small>
    </div>

    <div class="display-grid">
        <div id="terminal">> System Ready. Awaiting Successive Inference injection...</div>
        <div class="visualizer">
            <canvas id="manifold" width="400" height="400"></canvas>
            <div id="psi-readout" class="psi-box">Ψ = 0.00 + 0.00i</div>
            <div id="status-indicator" style="text-align: center; font-size: 0.8rem; margin-top: 5px;">STATUS: IDLE</div>
        </div>
    </div>

    <div class="controls">
        <label>Factor a:</label>
        <input type="text" id="valA" value="123456789">
        <label>Factor b:</label>
        <input type="text" id="valB" value="987654321">
        <button onclick="verifyMultiplication()">Verify Grounding</button>
        <button onclick="exportMultiReport()" style="background: #9d00ff; color: white;">Export Report</button>
    </div>
</div>

<script>
    const term = document.getElementById('terminal');
    const manifold = document.getElementById('manifold').getContext('2d');
    const psiEl = document.getElementById('psi-readout');
    const statusInd = document.getElementById('status-indicator');

    let currentProductString = "";
    let lastA = "", lastB = "";
    let finalStatus = "";

    const PHASE_MAP = {
        '1': [0, 1], '5': [0, 1],
        '2': [-1, 0], '6': [-1, 0],
        '3': [0, -1], '7': [0, -1],
        '4': [1, 0], '8': [1, 0],
        '9': [0, 0], '0': [0, 0]
    };

    function drawBase() {
        manifold.clearRect(0,0,400,400);
        manifold.strokeStyle = '#111';
        manifold.lineWidth = 1;
        manifold.beginPath();
        manifold.moveTo(200,0); manifold.lineTo(200,400);
        manifold.moveTo(0,200); manifold.lineTo(400,200);
        manifold.stroke();
    }

    async function verifyMultiplication() {
        lastA = document.getElementById('valA').value;
        lastB = document.getElementById('valB').value;
        term.innerHTML = "";
        drawBase();

        try {
            const bigA = BigInt(lastA);
            const bigB = BigInt(lastB);
            const product = bigA * bigB;
            currentProductString = product.toString();

            term.innerHTML += `> Factor A: ${bigA}\n> Factor B: ${bigB}\n`;
            term.innerHTML += `> Adelic Trace: ${currentProductString.length} digits extracted.\n\n`;

            let acc = { re: 0, im: 0 };

            for (let i = 0; i < currentProductString.length; i++) {
                const digit = currentProductString[i];
                const p = PHASE_MAP[digit];
                acc.re += p[0];
                acc.im += p[1];

                // Plotting the Hamiltonian Walk
                manifold.fillStyle = (digit === '3' || digit === '7') ? "var(--dpi-red)" : "var(--ac-green)";
                manifold.beginPath();
                manifold.arc(200 + acc.re * 3, 200 - acc.im * 3, 2, 0, Math.PI * 2);
                manifold.fill();

                psiEl.innerText = `Ψ = ${acc.re} + ${acc.im}i`;
                
                if (currentProductString.length < 200) await new Promise(r => setTimeout(r, 5));
            }

            // --- THE END GAME CONDITION INTEGRATION ---
            let mag = Math.sqrt(acc.re**2 + acc.im**2);
            let D = currentProductString.length;
            const GroundingThreshold = Math.sqrt(D); // Statistical walk limit

            if (mag === 0) {
                finalStatus = "LATTER COLLAPSED (Absolute Grounding)";
                statusInd.className = "status-msg success";
            } else if (mag < GroundingThreshold) {
                finalStatus = "AC STABLE (Statistical Grounding)";
                statusInd.className = "status-msg stable";
            } else {
                finalStatus = "EXCITED (Ghost Interference Detected)";
                statusInd.className = "status-msg excited";
            }

            term.innerHTML += `\n> COMPLETED ANALYTICS:`;
            term.innerHTML += `\n> Magnitude: ${mag.toFixed(4)}`;
            term.innerHTML += `\n> Threshold (√D): ${GroundingThreshold.toFixed(4)}`;
            term.innerHTML += `\n> Final State: ${finalStatus}`;
            statusInd.innerText = `STATUS: ${finalStatus}`;

        } catch (e) {
            term.innerHTML = "> ERROR: Invalid Adelic Input (Ensure integers only).";
        }
    }

    function exportMultiReport() {
        if (!currentProductString) return;
        const report = `
=========================================
PROJECT NP | END GAME VERIFICATION REPORT
=========================================
Factor A: ${lastA}
Factor B: ${lastB}
Product Length: ${currentProductString.length} digits
Final Phase: ${psiEl.innerText}
Grounding Threshold (√D): ${Math.sqrt(currentProductString.length).toFixed(4)}
Status: ${finalStatus}

[ADELIC TRACE]
${currentProductString}

[DETERMINATION]
Verified via GS-Framework Successive Inference.
=========================================`.trim();

        const blob = new Blob([report], {type: 'text/plain'});
        const a = document.createElement('a');
        a.download = `EndGame_Verification_${lastA}_x_${lastB}.txt`;
        a.href = URL.createObjectURL(blob);
        a.click();
    }

    drawBase();
</script>

</body>
</html>
