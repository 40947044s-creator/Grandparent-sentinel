<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Marilyn Fold: Fermat-Adelic Transition</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: 'Courier New', monospace; padding: 25px; }
        .terminal { border: 2px solid #00ffcc; padding: 20px; box-shadow: 0 0 20px #00ffcc; }
        .log { height: 180px; overflow-y: auto; background: #050505; border: 1px inset #00ffcc; padding: 10px; margin: 15px 0; }
        .pair-card { background: #002211; border-left: 4px solid #ff00ff; padding: 10px; margin: 5px 0; }
        input { background: #111; color: #00ffcc; border: 1px solid #00ffcc; width: 85%; padding: 10px; }
    </style>
</head>
<body>
<div class="terminal">
    <h2>Project NP: Fermat-Adelic Sieve (β = 1)</h2>
    <input type="text" id="targetManifold" value="124101807021766782342484052410310399261660557750169318538895180361199607">
    <button onclick="executeFermatFold()" style="padding:10px; cursor:pointer;">Execute Bit-Peeling</button>

    <div id="logTerminal" class="log">Awaiting Wave Eve Injection...</div>
    <div id="results"><h3>Grounded Non-Colliding Pairs:</h3><div id="pairList"></div></div>
</div>

<script>
async function executeFermatFold() {
    const input = document.getElementById('targetManifold').value;
    const log = document.getElementById('logTerminal');
    const list = document.getElementById('pairList');
    list.innerHTML = "";
    log.innerHTML += `> Initializing Adelic Trade (N ↔ P)...<br>`;

    try {
        const N = BigInt(input); // Bypasses the 170! overflow limit
        log.innerHTML += `> Wave Eve Injected. Grounding Identity: 1 × N<br>`;

        let p = 1n;
        let foundCount = 0;

        // Intersection Logic: P grows until it meets N at sqrt(N)
        while (p * p <= N) {
            if (N % p === 0n) {
                const a = N / p;
                const b = p;
                
                // Grounding via Adelic Consensus (5, 7, 53)
                list.innerHTML += `<div class="pair-card"><strong>A:</strong> ${a} <br> <strong>B:</strong> ${b}</div>`;
                log.innerHTML += `> Grounded Pair Found: ${p}<br>`;
                foundCount++;
            }
            p++;
            if (p % 1000n === 0n) {
                await new Promise(r => setTimeout(r, 0));
                if (p > 50000n) { log.innerHTML += `> Cap reached for simulation.<br>`; break; }
            }
        }
        log.innerHTML += `> Topological Collapse Achieved. Total Pairs: ${foundCount}<br>`;
    } catch (e) { log.innerHTML += `> FATAL: Residue Rattle at Bedrock.<br>`; }
}
</script>
</body>
</html>
