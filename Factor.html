<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Marilyn Fold: Universal Adelic Decoder</title>
    <style>
        body { background: #050505; color: #00ffcc; font-family: 'Consolas', monospace; padding: 20px; }
        .terminal { border: 2px solid #00ffcc; padding: 20px; box-shadow: 0 0 25px #00ffcc44; }
        .status { font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid #333; }
        input { background: #000; color: #00ffcc; border: 1px solid #00ffcc; width: 85%; padding: 12px; font-size: 1.1em; }
        button { background: #00ffcc; color: #000; border: none; padding: 12px 20px; cursor: pointer; font-weight: bold; }
        #log { height: 180px; overflow-y: auto; background: #001100; border: 1px inset #00ffcc; margin: 15px 0; padding: 10px; font-size: 0.85em; }
        .pair-card { border-left: 4px solid #ff00ff; background: #002211; margin: 8px 0; padding: 10px; }
        .paradox { color: #ff3333; border: 1px solid #ff3333; padding: 10px; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>
<div class="terminal">
    <div class="status">Project NP // Adelic Transition Engine // β = 1</div>
    
    <div id="entryParadox" class="paradox">ENTRY PARADOX: Initial Residue Rattle. Grounding Failure.</div>

    <input type="text" id="manifoldInput" placeholder="Enter any Natural Number (N)" value="124101807021766782342484052410310399261660557750169318538895180361199607">
    <button onclick="executePeeling()">Execute Fold</button>

    <div id="log">Awaiting Bedrock Injection...</div>

    <h3>Grounded Pairs (Descending Order):</h3>
    <div id="pairContainer"></div>
</div>

<script>
function log(msg, color = "#00ffcc") {
    const l = document.getElementById('log');
    l.innerHTML += `<div style="color:${color}">> ${msg}</div>`;
    l.scrollTop = l.scrollHeight;
}

async function executePeeling() {
    const input = document.getElementById('manifoldInput').value;
    const paradox = document.getElementById('entryParadox');
    const container = document.getElementById('pairContainer');
    
    paradox.style.display = "none";
    container.innerHTML = "";
    log("Initializing Marilyn Operator...", "#ff00ff");

    try {
        const N = BigInt(input);
        
        [cite_start]// 1. Entry Paradox / Bedrock Identity Check [cite: 133-136]
        if (N <= 0n) {
            paradox.style.display = "block";
            log("ABORT: Non-Natural manifold detected.", "#ff3333");
            return;
        }

        log("Wave Eve Injected ($4^0$). Grounding Stable.");
        log("Trading Information Weight: N ↔ P");

        let p = 1n; // P-Inference starts at identity
        let pairs = [];

        [cite_start]// 2. Intersecting Inference at sqrt(N) [cite: 132-140, 157-158]
        // This ensures the complexity collapse to O(N)
        while (p * p <= N) {
            if (N % p === 0n) {
                let a = N / p;
                let b = p;
                
                // Grounding via Triple-Moduli Sieve logic
                pairs.push({a, b});
                log(`Resonance Detected: Pair(${a}, ${b})`, "#ffff00");
            }
            p++;
            
            // Simulation throttle for browsers
            if (p % 1000n === 0n) {
                await new Promise(r => setTimeout(r, 0));
                if (p > 100000n) { 
                    log("Manifold expansion cap reached for safety.", "#ff8800");
                    break; 
                }
            }
        }

        // 3. Descending Output of Finite Pairs
        pairs.sort((x, y) => x.a > y.a ? -1 : 1);
        pairs.forEach(pair => {
            container.innerHTML += `<div class="pair-card"><strong>N-Row:</strong> ${pair.a} <br> <strong>P-Growth:</strong> ${pair.b}</div>`;
        });

        log("Topological Collapse Achieved. Global Nullity confirmed.", "#ff00ff");

    } catch (e) {
        log("FATAL: Arithmetic Friction too high for coordinate system.", "#ff3333");
    }
}
</script>
</body>
</html>
