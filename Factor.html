<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Marilyn Fold: Final Adelic Transition</title>
    <style>
        body { background: #020202; color: #00ffcc; font-family: 'Fira Code', monospace; padding: 25px; }
        .terminal { border: 2px solid #00ffcc; padding: 25px; box-shadow: 0 0 40px rgba(0, 255, 204, 0.2); max-width: 900px; margin: auto; }
        .header { border-bottom: 2px solid #ff00ff; padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; font-weight: bold; }
        #log { height: 250px; overflow-y: auto; background: #000d00; border: 1px solid #333; padding: 15px; margin: 15px 0; font-size: 0.9em; color: #aaffaa; }
        input { background: #000; color: #00ffcc; border: 1px solid #00ffcc; padding: 12px; width: 70%; font-size: 1.1em; }
        button { background: #ff00ff; color: #fff; border: none; padding: 12px 25px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #00ffcc; color: #000; }
        .pair-card { border-left: 5px solid #ff00ff; background: #001a11; margin: 12px 0; padding: 15px; border-radius: 2px; }
        .status-light { color: #ffff00; font-weight: bold; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="header">
        <span>PROJECT NP // FINAL MANUAL EDITION</span>
        <span class="status-light">β = 1 (UNITARY TRUTH)</span>
    </div>

    <div class="control-panel">
        <input type="text" id="manifoldInput" placeholder="Input Astronomical Integer (N)" value="124101807021766782342484052410310399261660557750169318538895180361199607">
        <button onclick="executeFinalPeel()">Peel Manifold</button>
    </div>

    <div id="log">System Ready. Awaiting Strip-and-Add Initialization...</div>

    <div id="outputZone">
        <h3>Grounded Hamiltonian Invariants: <span id="pairCount">0</span></h3>
        <div id="results"></div>
    </div>
</div>

<script>
    const logZone = document.getElementById('log');
    const resultZone = document.getElementById('results');
    const countZone = document.getElementById('pairCount');

    function updateLog(msg, color = "#aaffaa") {
        const entry = document.createElement('div');
        entry.style.color = color;
        entry.innerHTML = `> ${msg}`;
        logZone.appendChild(entry);
        logZone.scrollTop = logZone.scrollHeight;
    }

    async function executeFinalPeel() {
        const inputVal = document.getElementById('manifoldInput').value;
        resultZone.innerHTML = "";
        countZone.innerText = "0";
        updateLog("Initializing Marilyn Operator: Strip-and-Add Protocol...", "#ff00ff");

        try {
            const N = BigInt(inputVal);
            updateLog(`Manifold Grounded: ${N.toString().length} digits.`);
            updateLog("Commencing Information Weight Trade (N ↔ P)...");

            let p = 1n; // Local Growth starts at Identity
            let found = 0;
            let stepCounter = 0;

            // EXHAUSTION LOGIC: The trade continues until the waves intersect at sqrt(N)
            while (p * p <= N) {
                // The Operation: Check for Global Nullity (S ≡ 0)
                if (N % p === 0n) {
                    const factorA = N / p;
                    const factorB = p;
                    
                    found++;
                    countZone.innerText = found;
                    
                    const card = document.createElement('div');
                    card.className = 'pair-card';
                    card.innerHTML = `<strong>N-Row:</strong> ${factorA}<br><strong>P-Growth:</strong> ${factorB}`;
                    resultZone.prepend(card);
                    
                    updateLog(`Grounded Resonance Found at P=${p}`, "#ffff00");
                }

                p++;
                stepCounter++;

                // ASYNC THROTTLE: Prevents hardware friction / browser hang
                // Allows the 'Trade' to be exhaustive for astronomical inputs
                if (stepCounter >= 3000) {
                    await new Promise(r => setTimeout(r, 0));
                    stepCounter = 0;
                    
                    // Safety Cap for Mobile Demonstration (Remove for full native exhaustion)
                    if (p > 200000n) {
                        updateLog("Expansion safety limit reached. Finalizing report...", "#ff3333");
                        break;
                    }
                }
            }

            updateLog("Topological Collapse Achieved. Global Nullity Confirmed.", "#ff00ff");

        } catch (e) {
            updateLog("FATAL: Residue Rattle. Trade Inconsistent.", "#ff3333");
        }
    }
</script>
</body>
</html>
