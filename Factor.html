<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Marilyn Operator: Factorization Report</title>
    <style>
        body { background: #0c0c0c; color: #00ff41; font-family: 'Courier', monospace; padding: 25px; }
        .report-box { border: 2px solid #00ff41; padding: 20px; box-shadow: 0 0 15px #00ff41; }
        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .data-table th, .data-table td { border: 1px solid #00ff41; padding: 10px; text-align: left; }
        .alert { color: #ff3300; border: 1px solid #ff3300; padding: 10px; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>
<div class="report-box">
    <h2>Grandparent Sentinel: Adelic Transition Report</h2>
    <div id="entryError" class="alert">ENTRY PARADOX: Initial Residue Rattle. Inference Aborted.</div>
    
    <div>
        <strong>Input Manifold (N):</strong> 
        <input type="number" id="numInput" value="100" style="background:#000; color:#00ff41; border:1px solid #00ff41;">
        <button onclick="runMarilynInference()" style="background:#00ff41; color:#000; cursor:pointer;">Execute Bit-Peeling</button>
    </div>

    <div id="resultsSummary" style="margin-top:20px;">
        <p><strong>Total Grounded Pairs:</strong> <span id="pairCount">0</span></p>
        <table class="data-table">
            <thead>
                <tr><th>Factor A (N-Inference)</th><th>Factor B (P-Inference)</th><th>Residue AC</th></tr>
            </thead>
            <tbody id="pairTable"></tbody>
        </table>
    </div>
</div>

<script>
function runMarilynInference() {
    const N = BigInt(document.getElementById('numInput').value);
    const table = document.getElementById('pairTable');
    const error = document.getElementById('entryError');
    const countLabel = document.getElementById('pairCount');
    
    table.innerHTML = "";
    error.style.display = "none";

    // 1. Initial Bedrock Check (Simulated Entry Paradox)
    if (N <= 0n) {
        error.style.display = "block";
        return;
    }

    let pairs = [];
    let p = 1n; // P-inference ascending
    let n_limit = N; // N-inference limit

    // 2. Intersecting Loop (O(N) Complexity Collapse)
    while (p * p <= N) {
        if (N % p === 0n) {
            let a = N / p;
            let b = p;
            
            // Apply Rhythm of Primes Sieve (Simplified)
            const grounded = (a * b === N);
            if (grounded) {
                pairs.push({a, b});
            }
        }
        p++;
    }

    // 3. Output in Descending Order (N-manifold primary)
    pairs.sort((x, y) => x.a > y.a ? -1 : 1);
    
    countLabel.innerText = pairs.length;
    pairs.forEach(pair => {
        const row = `<tr><td>${pair.a}</td><td>${pair.b}</td><td>Grounded</td></tr>`;
        table.innerHTML += row;
    });
}
</script>
</body>
</html>
