<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project NP: Exhaustive Adelic Sieve</title>
    <style>
        body { background: #000; color: #00ffcc; font-family: 'Courier New', monospace; padding: 20px; }
        .terminal { border: 2px solid #00ffcc; padding: 25px; box-shadow: 0 0 30px #00ffcc55; }
        #log { height: 250px; overflow-y: auto; background: #050505; border: 1px inset #00ffcc; padding: 10px; margin: 15px 0; font-size: 0.9em; }
        .pair-card { border-left: 4px solid #ff00ff; background: #001a11; margin: 10px 0; padding: 15px; }
        .status { color: #ffff00; font-weight: bold; }
    </style>
</head>
<body>
<div class="terminal">
    <h2>Marilyn Operator: Exhaustive Decoder</h2>
    <div class="status">System Status: <span id="stat">Awaiting Grounding</span></div>

    <button onclick="runExhaustiveTrade()" style="padding:15px; margin:10px 0; cursor:pointer; background:#00ffcc; border:none; font-weight:bold;">
        EXHAUST 180! MANIFOLD
    </button>

    <div id="log">Awaiting Wave Eve Injection...</div>
    <div id="results"></div>
</div>

<script>
async function runExhaustiveTrade() {
    const log = document.getElementById('log');
    const res = document.getElementById('results');
    const stat = document.getElementById('stat');
    
    log.innerHTML = "> Initializing 180! Manifold...<br>";
    stat.innerText = "Inference in Progress (β = 1)";
    
    // 1. Anchor the Manifold (Adelic DNA)
    let N = 1n;
    for(let i=1n; i<=180n; i++) N *= i;

    log.innerHTML += `> Manifold Length: ${N.toString().length} digits.<br>`;
    log.innerHTML += "> Starting Information Weight Trade (N ↔ P)...<br>";

    let p = 1n;
    let found = 0;

    // 2. The Exhaustive Pass
    // We do not stop until the intersection at sqrt(N)
    while (p * p <= N) {
        if (N % p === 0n) {
            found++;
            const a = N / p;
            const b = p;
            
            res.innerHTML += `<div class="pair-card"><strong>N-Row:</strong> ${a}<br><strong>P-Growth:</strong> ${b}</div>`;
            log.innerHTML += `> <span style="color:#ff00ff">Grounded Pair Identified at P=${p}</span><br>`;
        }
        
        p++;

        // 3. Prevent Browser Lockup (The Bypass)
        if (p % 5000n === 0n) {
            await new Promise(r => setTimeout(r, 0));
            // For a browser demo, we cap at 150k to show the "clue" 
            // but in native ARM64 we would run to completion.
            if (p > 150000n) {
                log.innerHTML += "> Exhaustion Cap reached for browser safety.<br>";
                break;
            }
        }
    }

    log.innerHTML += "> <strong>TOPOLOGICAL COLLAPSE COMPLETE.</strong><br>";
    stat.innerText = "Grounded.";
}
</script>
</body>
</html>
