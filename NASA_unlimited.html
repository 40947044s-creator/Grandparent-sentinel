<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NASA Sentinel: Aligned AC Audit</title>
    <style>
        body { background: #000b1e; color: #e0e0e0; font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; }
        h1 { color: #00ffd2; text-align: center; border-bottom: 1px solid #333; }
        .status-bar { background: #011d35; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-around; align-items: center; border: 1px solid #1a3a5a; }
        #output-strip { height: 400px; overflow-y: scroll; background: #001529; padding: 20px; border: 2px solid #1a3a5a; border-radius: 8px; display: flex; flex-direction: column-reverse; }
        .audit-entry { margin-bottom: 12px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 4px; border-left: 3px solid #535353; font-size: 0.85em; }
        .glow-residue { border-left-color: #00ffd2; background: rgba(0, 255, 210, 0.05); }
        #toggle-btn { background: #00ffd2; color: #000b1e; border: none; padding: 8px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; }
        #toggle-btn.paused { background: #ff4d4d; color: white; }
    </style>
</head>
<body>
<div class="container">
    <h1>GRANDPARENT-SENTINEL // ALIGNED AUDIT</h1>
    <div class="status-bar">
        <span>STATUS: <span id="alert-status" style="color:#00ffd2">ALIGNED</span></span>
        <span>BITS: <span id="bit-count" style="color:#00ffd2">0</span></span>
        <button id="toggle-btn" onclick="toggleLineage()">PAUSE ENGINE</button>
    </div>

    <div id="output-strip"><div class="audit-entry">Initializing Aligned Handshake...</div></div>
</div>

<script>
    let isRunning = true;
    let globalIndex = 0;
    const SCALE = 1000;
    const SURGERY_DELAY = 100;

    function toggleLineage() {
        isRunning = !isRunning;
        const btn = document.getElementById('toggle-btn');
        btn.innerText = isRunning ? "PAUSE ENGINE" : "RESUME ENGINE";
        btn.className = isRunning ? "" : "paused";
        if (isRunning) runSentinelLoop();
    }

    async function runSentinelLoop() {
        const output = document.getElementById('output-strip');
        const countEl = document.getElementById('bit-count');
        const statusEl = document.getElementById('alert-status');

        const SQL = "select hostname,pl_name,pl_orbper from pscomppars where pl_orbper is not null order by pl_pubdate desc";
        const PROXY_URL = `https://corsproxy.io/?${encodeURIComponent("https://exoplanetarchive.ipac.caltech.edu/TAP/sync?query=" + encodeURIComponent(SQL) + "&format=json")}`;

        try {
            const response = await fetch(PROXY_URL);
            const dataArray = await response.json();

            // The Pulse Loop
            for (let star of dataArray) {
                if (!isRunning) return;

                const start = performance.now();
                const s = parseFloat(star.pl_orbper) || 0;
                
                // ALIGNED MATH: Quotient (I) and Remainder (R)
                const weightS = Math.floor(s * SCALE);
                const R = weightS % 53;
                const I = Math.floor(weightS / 53); 

                const div = document.createElement('div');
                div.className = "audit-entry";
                if (globalIndex % 1855 === 0) div.className += " glow-residue";

                div.innerHTML = `<strong>Bit ${globalIndex}:</strong> ${star.pl_name}<br>` +
                                 `&gt; Quotient (I): ${I} | Residue (R): ${R/SCALE} (AC ✓)`;
                
                output.appendChild(div);
                globalIndex++;
                countEl.innerText = globalIndex;

                const end = performance.now();
                if (end - start > 200) { // Overhead Pause
                    isRunning = false;
                    statusEl.innerHTML = "OVERHEAD PAUSE";
                    return;
                }

                await new Promise(r => setTimeout(r, SURGERY_DELAY));
                if (output.childNodes.length > 50) output.removeChild(output.firstChild);
            }
        } catch (e) { statusEl.innerHTML = "LINK SEVERED"; }
    }
    window.onload = runSentinelLoop;
</script>
</body>
</html>
