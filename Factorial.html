<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Q-Bit Engine | Phase Grounding Terminal</title>
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-purple: #9d00ff;
            --bg-black: #050505;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-black);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .engine-frame {
            background: var(--glass);
            border: 1px solid var(--neon-blue);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 30px;
            width: 90%;
            max-width: 800px;
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.1);
        }

        .header {
            text-align: center;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .header h1 {
            color: var(--neon-blue);
            letter-spacing: 2px;
            margin: 0;
            font-size: 1.5rem;
        }

        .input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }

        input {
            background: #111;
            border: 1px solid #444;
            color: var(--neon-blue);
            padding: 10px;
            border-radius: 4px;
            outline: none;
            width: 100px;
        }

        button {
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            border: none;
            color: white;
            padding: 10px 25px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        .display-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        #log {
            background: #000;
            height: 300px;
            overflow-y: auto;
            font-family: 'Consolas', monospace;
            font-size: 0.85rem;
            padding: 10px;
            border: 1px solid #222;
            color: #00ff41;
        }

        canvas {
            border: 1px solid #333;
            background: radial-gradient(circle, #111 0%, #000 100%);
        }

        .stat-box {
            margin-top: 15px;
            display: flex;
            justify-content: space-around;
            font-size: 0.9rem;
            color: var(--neon-blue);
        }
    </style>
</head>
<body>

<div class="engine-frame">
    <div class="header">
        <h1>MARILYN Q-BIT ENGINE</h1>
        <small>Adelic Transition / Hamiltonian Phase Mapping</small>
    </div>

    <div class="input-group">
        <input type="number" id="inputN" value="5" min="1" max="1000">
        <button onclick="runEngine()">GENERATE GROUNDING</button>
    </div>

    <div class="display-grid">
        <div id="log">--- System Ready: Awaiting Wave Eve ---</div>
        <canvas id="complexPlane" width="300" height="300"></canvas>
    </div>

    <div class="stat-box">
        <span>Accumulator: <b id="accVal">0 + 0i</b></span>
        <span id="status">Status: IDLE</span>
    </div>
</div>

<script>
    const ctx = document.getElementById('complexPlane').getContext('2d');
    const logEl = document.getElementById('log');
    const accEl = document.getElementById('accVal');
    const statusEl = document.getElementById('status');

    const Q_MAP = {
        0: { re: 1, im: 0, label: "0 (Ground)" },
        1: { re: 0, im: 1, label: "i (Lead)" },
        2: { re: -1, im: 0, label: "-1 (Counter)" },
        3: { re: 0, im: -1, label: "-i (Liar)" }
    };

    function drawGrid() {
        ctx.clearRect(0, 0, 300, 300);
        ctx.strokeStyle = '#222';
        ctx.beginPath();
        ctx.moveTo(150, 0); ctx.lineTo(150, 300);
        ctx.moveTo(0, 150); ctx.lineTo(300, 150);
        ctx.stroke();
    }

    function log(msg, color = "#00ff41") {
        const div = document.createElement('div');
        div.style.color = color;
        div.innerHTML = `> ${msg}`;
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
    }

    async function runEngine() {
        const n = parseInt(document.getElementById('inputN').value);
        logEl.innerHTML = "";
        drawGrid();
        
        let acc = { re: 0, im: 0 };
        let currentProduct = BigInt(1);

        log(`Initializing Project NP Grounding...`);
        log(`Injecting Wave Eve bit (S ≡ 4^0)`);
        statusEl.innerText = "Status: AC EXECUTION";
        statusEl.style.color = "#00ff41";

        for (let i = 1; i <= n; i++) {
            currentProduct *= BigInt(i);
            
            // Marilyn Fold Simulation: Extracting residue from q-bit window
            // We use the quaternary mapping to determine the "direction"
            let qBit = Number(currentProduct % 4n);
            let phase = Q_MAP[qBit];

            acc.re += phase.re;
            acc.im += phase.im;

            // Visualizing the walk
            const scale = 20;
            const x = 150 + acc.re * scale;
            const y = 150 - acc.im * scale;

            ctx.fillStyle = qBit === 3 ? "#ff3e3e" : "#00d4ff";
            ctx.beginPath();
            ctx.arc(x, y, 3, 0, Math.PI * 2);
            ctx.fill();

            accEl.innerText = `${acc.re} + ${acc.im}i`;

            if (acc.re === 0 && acc.im === 0) {
                log(`Node ${i}: LATTER COLLAPSED. Grounding Achieved.`, "#9d00ff");
            } else {
                log(`Node ${i}: Transitioning via q-bit ${phase.label}`);
            }

            if (n < 100) await new Promise(r => setTimeout(r, 50));
        }

        log(`-----------------------------------`);
        log(`Hamiltonian Invariant Grounding Complete.`);
        log(`Final Magnitude: ${Math.sqrt(acc.re**2 + acc.im**2).toFixed(2)}`);
    }

    drawGrid();
</script>

</body>
</html>
