<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project NP | p-Nested Super-Node AC</title>
    <style>
        :root {
            --ac-green: #00ff9d;
            --super-purple: #bf00ff;
            --void-bg: #020202;
            --term-green: #00ff41;
        }

        body {
            background: var(--void-bg);
            color: #ccc;
            font-family: 'JetBrains Mono', monospace;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .engine-frame {
            border: 2px solid var(--super-purple);
            width: 95%;
            max-width: 1000px;
            padding: 25px;
            background: rgba(0,0,0,0.95);
            box-shadow: 0 0 50px rgba(191, 0, 255, 0.1);
            border-radius: 8px;
        }

        .manifold-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }

        canvas {
            border: 1px solid #222;
            background: black;
            width: 100%;
            height: 250px;
        }

        .terminal {
            background: #000;
            border: 1px solid var(--super-purple);
            height: 250px;
            overflow-y: auto;
            padding: 15px;
            font-size: 0.85rem;
            color: var(--term-green);
        }

        .status-panel {
            border: 1px dashed var(--super-purple);
            padding: 15px;
            text-align: center;
            margin-bottom: 20px;
            background: rgba(191, 0, 255, 0.05);
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
            justify-content: center;
        }

        input {
            width: 70px;
            background: #111;
            border: 1px solid var(--super-purple);
            color: white;
            padding: 8px;
            border-radius: 4px;
        }

        button {
            background: var(--super-purple);
            color: white;
            border: none;
            padding: 10px 25px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 4px;
        }

        .label { color: var(--super-purple); font-size: 0.7rem; text-transform: uppercase; margin-bottom: 5px; display: block;}
    </style>
</head>
<body>

<div class="engine-frame">
    <div style="border-bottom: 1px solid var(--super-purple); padding-bottom: 10px; margin-bottom: 20px;">
        <strong>RECURSIVE SUPER-NODE // p-NESTED MANIFOLD</strong><br>
        <small>Complexity: $O(p \times n)$ | $n\underbrace{!!!\dots!}_{p}$ Phase Resolution</small>
    </div>

    <div class="status-panel" id="globalStatus">
        SYSTEM READY // AWAITING WAVE EVE INJECTION
    </div>

    <div class="manifold-grid">
        <div>
            <span class="label">Local Phase Walk (Current Node)</span>
            <canvas id="localCanvas"></canvas>
        </div>
        <div>
            <span class="label">Global Adelic Chain (p-Depth)</span>
            <canvas id="globalCanvas"></canvas>
        </div>
    </div>

    <div class="terminal" id="term">> Adelic Transition Engine V3.0 active...</div>

    <div class="controls">
        <label>n:</label>
        <input type="number" id="nVal" value="5">
        <label>p:</label>
        <input type="number" id="pVal" value="3">
        <button onclick="runRecursiveEngine()">EXECUTE p-NESTED GROUNDING</button>
    </div>
</div>

<script>
    const term = document.getElementById('term');
    const localCtx = document.getElementById('localCanvas').getContext('2d');
    const globalCtx = document.getElementById('globalCanvas').getContext('2d');
    const status = document.getElementById('globalStatus');

    function log(msg, color = "var(--term-green)") {
        const div = document.createElement('div');
        div.style.color = color;
        div.innerHTML = `> ${msg}`;
        term.appendChild(div);
        term.scrollTop = term.scrollHeight;
    }

    function clearCanvases() {
        localCtx.clearRect(0, 0, 500, 500);
        globalCtx.clearRect(0, 0, 500, 500);
    }

    async function runRecursiveEngine() {
        const n = parseInt(document.getElementById('nVal').value);
        const p = parseInt(document.getElementById('pVal').value);
        term.innerHTML = "";
        clearCanvases();

        log(`Initiating p-Nested Transition: depth=${p}, base=${n}`);
        let currentPsi = { re: 0, im: 0 };
        
        // Loop through each nesting level p
        for (let level = 1; level <= p; level++) {
            log(`LEVEL ${level}: Starting Fold...`, "var(--super-purple)");
            
            // If level 1, calculate standard n!
            // If level > 1, use the previous level's psi as the rotational seed (Super-Node logic)
            if (level === 1) {
                currentPsi = await foldFactorial(n, localCtx);
            } else {
                currentPsi = await foldSuperNode(currentPsi, localCtx, level);
            }

            // Map level completion to the Global Adelic Chain
            drawGlobalPoint(level, p, currentPsi);
            
            log(`LEVEL ${level} INVARIANT: ${currentPsi.re.toFixed(2)} + ${currentPsi.im.toFixed(2)}i`);

            if (Math.abs(currentPsi.re) < 0.01 && Math.abs(currentPsi.im) < 0.01) {
                log(`LATTER COLLAPSED at Level ${level}. Total grounding achieved.`, "white");
                status.innerText = `AC 100% SECURE // NESTED GROUNDING AT DEPTH ${level}`;
                status.style.color = "var(--ac-green)";
                break; 
            }
        }
    }

    async function foldFactorial(n, ctx) {
        let acc = { re: 0, im: 0 };
        let fact = BigInt(1);
        for (let i = 1; i <= n; i++) {
            fact *= BigInt(i);
            let q = Number(fact % 4n);
            let phases = [{re:1,im:0}, {re:0,im:1}, {re:-1,im:0}, {re:0,im:-1}];
            acc.re += phases[q].re;
            acc.im += phases[q].im;
            drawLocalPoint(ctx, acc, "#00ff9d");
            await new Promise(r => setTimeout(r, 20));
        }
        return acc;
    }

    async function foldSuperNode(seedPsi, ctx, level) {
        let acc = { re: 0, im: 0 };
        const angle = Math.atan2(seedPsi.im, seedPsi.re);
        const mag = Math.sqrt(seedPsi.re**2 + seedPsi.im**2);

        for (let j = 1; j <= 10; j++) {
            let rotation = angle * j;
            acc.re += Math.cos(rotation) * mag;
            acc.im += Math.sin(rotation) * mag;
            drawLocalPoint(ctx, acc, "#bf00ff");
            await new Promise(r => setTimeout(r, 20));
        }
        return acc;
    }

    function drawLocalPoint(ctx, acc, color) {
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(150 + acc.re * 5, 100 - acc.im * 5, 2, 0, Math.PI * 2);
        ctx.fill();
    }

    function drawGlobalPoint(level, totalP, psi) {
        const x = (level / totalP) * 300;
        const y = 100 - (psi.re + psi.im) * 2;
        globalCtx.strokeStyle = "var(--super-purple)";
        globalCtx.beginPath();
        globalCtx.arc(x, y, 4, 0, Math.PI * 2);
        globalCtx.stroke();
    }
</script>

</body>
</html>
