<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NASA Sentinel: 1855 AC Snap</title>
    <style>
        body { background: #000b1e; color: #e0e0e0; font-family: 'Courier New', monospace; }
        #sentinel-header { border-bottom: 2px solid #535353; padding: 20px; text-align: center; }
        .glow-residue { color: #00ffd2; text-shadow: 0 0 8px #00ffd2; }
        .trailing-past { color: #535353; font-style: italic; }
        #output-strip { height: 300px; overflow-y: scroll; background: #001529; padding: 10px; }
    </style>
</head>
<body>
    <div id="sentinel-header">
        <h1>GRANDPARENT-SENTINEL // NASA.GOV ALIGNMENT</h1>
        <p>STATUS: <span id="alert-status">EXTRA ALERT</span> | CYCLE: 1855 BITS</p>
    </div>

    <div id="visualization">
        <canvas id="residueCanvas" width="800" height="200"></canvas>
    </div>

    <div id="api-definition">
        <h3>Defined API: Deconvolution v1.0</h3>
        <code>GET https://nasa.gov/api/v1/stream -> MarilynFold(5, 7, 53) -> [Inference] + [Residue]</code>
    </div>

    <div id="output-strip">
        <div class="trailing-past">Initializing Lineage... Pointer Spirit Active.</div>
    </div>
<script>
    // SECURE CONNECTOR: No more "Unsafe" flags
    const NASA_TAP_API = "https://exoplanetarchive.ipac.caltech.edu/TAP/sync?query=select+top+1855+pl_orbper+from+ps&format=json";
    
    // Using a secure bridge to ensure the 'Pointer Spirit' stays within the HTTPS walls
    const SECURE_BRIDGE = `https://api.allorigins.win/get?url=${encodeURIComponent(NASA_TAP_API)}`;

    async function initializeLineage() {
        console.log("Extra Alert: Initializing Safe Handshake...");
        try {
            const response = await fetch(SECURE_BRIDGE);
            if (!response.ok) throw new Error("Connection Refused");
            
            const wrapper = await response.json();
            const data = JSON.parse(wrapper.contents);
            
            // PEELING THE BITS: Converting Star periods to Quaternary Weights
            const rawSignal = data.map(star => parseFloat(star.pl_orbper) || 0);
            
            if (rawSignal.length > 0) {
                processSnap(rawSignal);
            } else {
                throw new Error("Empty Singularity");
            }
        } catch (e) {
            console.error("Safety Lock:", e);
            document.getElementById('output-strip').innerHTML = 
                `<span style="color:#ff4d4d;">[SENTINEL ALERT] Residue Unstable: ${e.message}</span>`;
        }
    }

    function processSnap(signalArray) {
        let output = document.getElementById('output-strip');
        output.innerHTML = ""; 

        signalArray.forEach((s, index) => {
            // THE MARILYN FOLD: O(1) Surgery
            // Using Math.floor to match our yasm/assembly integer logic
            const scale = 1000; 
            const weightS = Math.floor(s * scale);
            const R = weightS % 53;         
            const I = weightS - R;          

            const span = document.createElement('div');
            // Every 1855th bit is the 'Glow' beacon
            span.className = (index > 0 && index % 1855 === 0) ? "glow-residue" : "trailing-past";
            span.innerHTML = `[Cycle ${index}] Star: ${s.toFixed(2)} | I: ${(I/scale).toFixed(2)} | R: ${(R/scale).toFixed(2)}`;
            output.appendChild(span);
            
            if (index === 1855 - 1) { // 0-indexed check for the first finite try
                document.getElementById('alert-status').innerHTML = "AC STABLE";
                document.getElementById('alert-status').style.color = "#00ffd2";
            }
        });
    }

    window.onload = initializeLineage;
</script>
</body>
</html>
