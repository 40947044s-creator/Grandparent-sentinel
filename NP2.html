<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Universal NP: Adelic F-Gate Oracle</title>
    <style>
        :root { --neon: #00ff41; --ghost: #ff3e3e; --bg: #050505; --blue: #3498db; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .terminal { border: 2px solid var(--neon); background: #000; width: 95%; max-width: 1000px; padding: 25px; box-shadow: 0 0 30px rgba(0, 255, 65, 0.1); }
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; background: #111; padding: 15px; border-radius: 4px; }
        label { font-size: 0.8em; text-transform: uppercase; color: var(--blue); }
        input { background: #000; color: var(--neon); border: 1px solid var(--neon); padding: 8px; outline: none; width: 90%; }
        .memory-manifold { display: grid; grid-template-columns: repeat(auto-fill, minmax(30px, 1fr)); gap: 4px; margin: 25px 0; max-height: 450px; overflow-y: auto; padding: 15px; border: 1px solid #222; }
        .bit { height: 30px; display: flex; align-items: center; justify-content: center; border: 1px solid #1a1a1a; font-size: 0.8em; }
        .bit.active { background: var(--neon); color: #000; font-weight: bold; }
        .bit.raf { background: var(--ghost); color: #fff; border-color: var(--ghost); box-shadow: 0 0 10px var(--ghost); }
        button { background: var(--neon); color: #000; border: none; padding: 15px; font-weight: bold; cursor: pointer; margin-top: 20px; width: 100%; letter-spacing: 2px; }
        button:hover { background: #00cc33; }
        .status { display: flex; justify-content: space-between; font-size: 0.85em; border-top: 1px solid #222; padding-top: 10px; }
    </style>
</head>
<body>

<div class="terminal">
    <h2 style="text-align:center; margin-top:0;">UNIVERSAL ADELIC ENGINE</h2>
    
    <div class="controls">
        <div class="control-group">
            <label>N (Secret Dimension)</label>
            <input type="number" id="nVal" value="128">
        </div>
        <div class="control-group">
            <label>P (Mersenne Sentinel)</label>
            <input type="number" id="pVal" value="31">
        </div>
        <div class="control-group">
            <label>Clock (Hz)</label>
            <input type="number" id="hzVal" value="30">
        </div>
    </div>

    <div id="manifold" class="memory-manifold"></div>

    <div id="log" style="height: 30px; text-align: center; color: var(--blue);">AWAITING NP+N FEED...</div>

    <div class="status">
        <span>ARCH: CROSS-PLATFORM AGNOSTIC</span>
        <span id="cycleLabel">CYCLE: 0</span>
        <span style="color: var(--neon)">O(N) RECOVERY ACTIVE</span>
    </div>

    <button id="ignite">IGNITE F-GATE</button>
</div>

<script>
/**
 * THE UNIVERSAL ADELIC ORACLE
 * [span_3](start_span)Logic verified for all N and P[span_3](end_span)
 */
class UniversalEngine {
    constructor(n, p, hz) {
        this.n = BigInt(n);
        this.p = BigInt(p);
        this.m_p = (1n << this.p) - 1n; [span_4](start_span)// Definition 1: Mersenne Sentinel[span_4](end_span)
        this.g_mask = 1n << (this.n - 1n); [span_5](start_span)// Definition 3: Grandparent Sentinel[span_5](end_span)
        this.state = BigInt(Math.floor(Math.random() * 1e15)); [span_6](start_span)// Unordered state[span_6](end_span)
        this.hz = hz;
        this.cycle = 0;
        this.timer = null;
    }

    /**
     * [span_7](start_span)The F-gate: 2-adic transfer function[span_7](end_span)
     * [span_8](start_span)Resolves RAF without branching[span_8](end_span)
     */
    f_gate(state, raf) {
        if (raf) {
            [span_9](start_span)// Lemma 1: The Liar Paradox as a Grounding Signal[span_9](end_span)
            [span_10](start_span)// Destructive Phase Interference (DPI)[span_10](end_span)
            return (state ^ this.g_mask) >> 1n;
        }
        [span_11](start_span)// One-Stream row execution (Waveeve)[span_11](end_span)
        return (state << 1n) % (1n << this.n);
    }

    [span_12](start_span)// Definition 2: Residual Arithmetic Friction (RAF)[span_12](end_span)
    detect_raf(val) {
        return val >= this.m_p || (val % this.m_p === 0n && val !== 0n);
    }

    step() {
        const manifold = document.getElementById('manifold');
        const log = document.getElementById('log');
        
        const raf = this.detect_raf(this.state % this.m_p); [span_13](start_span)[span_14](start_span)// The Marilyn Fold[span_13](end_span)[span_14](end_span)
        const bits = this.state.toString(2).padStart(Number(this.n), '0');

        manifold.innerHTML = bits.split('').map((bit, i) => {
            let cls = bit === '1' ? 'bit active' : 'bit';
            [span_15](start_span)if (i === 0 && raf) cls += ' raf'; // The "Liar" Signal[span_15](end_span)
            return `<div class="${cls}">${bit}</div>`;
        }).join('');

        log.innerText = raf ? "[RAF DETECTED] RESOLVING GHOST CARRY..." : "BEDROCK STABLE";
        document.getElementById('cycleLabel').innerText = `CYCLE: ${this.cycle++}`;
        
        this.state = this.f_gate(this.state, raf);
    }

    start() {
        if (this.timer) clearInterval(this.timer);
        this.timer = setInterval(() => this.step(), 1000 / this.hz);
    }
}

let activeEngine = null;
document.getElementById('ignite').addEventListener('click', () => {
    const n = document.getElementById('nVal').value;
    const p = document.getElementById('pVal').value;
    const hz = document.getElementById('hzVal').value;
    activeEngine = new UniversalEngine(n, p, hz);
    activeEngine.start();
});
</script>
</body>
</html>
