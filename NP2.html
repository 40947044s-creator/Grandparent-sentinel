<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project NP: F-Gate Bit-Clock Monitor</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .controls { border: 1px solid #00ff41; padding: 15px; margin-bottom: 20px; background: #000; width: 100%; max-width: 800px; display: flex; gap: 20px; justify-content: center; align-items: center; }
        .dashboard { border: 2px solid #00ff41; padding: 20px; width: 100%; max-width: 800px; background: #000; box-shadow: 0 0 20px rgba(0, 255, 65, 0.1); }
        .memory-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(25px, 1fr)); gap: 4px; margin: 20px 0; max-height: 300px; overflow-y: auto; padding: 10px; border: 1px solid #222; }
        .bit { border: 1px solid #333; height: 25px; display: flex; align-items: center; justify-content: center; font-size: 0.8em; transition: 0.1s; }
        .bit.active { background: #00ff41; color: #000; box-shadow: 0 0 8px #00ff41; }
        .bit.raf { background: #ff3e3e; color: #fff; box-shadow: 0 0 10px #ff3e3e; border-color: #ff3e3e; }
        input { background: #111; color: #00ff41; border: 1px solid #00ff41; padding: 5px; width: 60px; }
        .status { border-top: 1px solid #333; padding-top: 10px; margin-top: 10px; font-size: 0.9em; display: flex; justify-content: space-between; }
        .liar-signal { color: #ff3e3e; font-weight: bold; }
    </style>
</head>
<body>

<div class="controls">
    <div>N (Dim): <input type="number" id="inputN" value="64"></div>
    <div>P (Mersenne): <input type="number" id="inputP" value="31"></div>
    <div>Hz: <input type="number" id="inputHz" value="10"></div>
    <button id="startBtn" style="background:#00ff41; color:#000; border:none; padding:8px 15px; cursor:pointer; font-weight:bold;">INITIALIZE F-GATE</button>
</div>

<div class="dashboard">
    <div style="font-size: 1.2em; margin-bottom: 10px;">TRANSITION STATE: <span id="clockHz">0</span> Hz</div>
    
    <div class="memory-grid" id="memoryGrid"></div>

    <div class="status">
        <div id="logicStatus">STANDING BY...</div>
        <div id="complexity">COMPLEXITY: -</div>
    </div>
</div>

<script>
class AdelicTransitionEngine {
    constructor(n, p, hz) {
        this.n = n;
        this.p = p;
        this.interval = 1000 / hz;
        this.m_p = (1n << BigInt(p)) - 1n; [span_4](start_span)// Mersenne Sentinel[span_4](end_span)
        this.g_mask = 1n << BigInt(n - 1); [span_5](start_span)// Grandparent Sentinel G[span_5](end_span)
        this.state = BigInt(Math.floor(Math.random() * 1000000));
        this.timer = null;
    }

    [span_6](start_span)// Lemma 1: The Liar Paradox as a Grounding Signal[span_6](end_span)
    f_gate(state, raf_signal) {
        if (raf_signal) {
            [span_7](start_span)[span_8](start_span)// DPI Reversal: Resolve via 2-adic deconvolution[span_7](end_span)[span_8](end_span)
            return (state ^ this.g_mask) >> 1n;
        }
        [span_9](start_span)// Waveeve (W) "One-Stream" shift[span_9](end_span)
        return (state << 1n) % (1n << BigInt(this.n));
    }

    detect_raf(val) {
        [span_10](start_span)[span_11](start_span)// Residual Arithmetic Friction (Ghost Carry) detection[span_10](end_span)[span_11](end_span)
        return val >= this.m_p || (val % this.m_p === 0n && val !== 0n);
    }

    render() {
        const grid = document.getElementById('memoryGrid');
        const raf = this.detect_raf(this.state);
        const bitString = this.state.toString(2).padStart(this.n, '0');
        
        grid.innerHTML = bitString.split('').map((bit, i) => {
            const isMSB = i === 0;
            const cssClass = bit === '1' ? (isMSB && raf ? 'bit active raf' : 'bit active') : 'bit';
            return `<div class="${cssClass}">${bit}</div>`;
        }).join('');

        document.getElementById('logicStatus').innerHTML = raf ? 
            `<span class="liar-signal">RAF DETECTED: F-GATE DPI ENGAGED</span>` : 
            "QUATERNARY BEDROCK STABLE";
        
        document.getElementById('complexity').innerText = `COMPLEXITY: O(N)`;
        
        this.state = this.f_gate(this.state, raf);
    }

    stop() { if (this.timer) clearInterval(this.timer); }
    
    start() {
        this.stop();
        document.getElementById('clockHz').innerText = (1000 / this.interval).toFixed(0);
        this.timer = setInterval(() => this.render(), this.interval);
    }
}

let engine = null;
document.getElementById('startBtn').addEventListener('click', () => {
    const n = parseInt(document.getElementById('inputN').value);
    const p = parseInt(document.getElementById('inputP').value);
    const hz = parseInt(document.getElementById('inputHz').value);
    
    if (engine) engine.stop();
    engine = new AdelicTransitionEngine(n, p, hz);
    engine.start();
});
</script>
</body>
</html>
