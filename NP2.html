<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project NP: Adelic F-Gate Oracle</title>
    <style>
        :root { --neon: #00ff41; --ghost: #ff3e3e; --bg: #050505; --blue: #3498db; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .oracle-shell { border: 2px solid var(--neon); background: #000; width: 95%; max-width: 900px; padding: 25px; box-shadow: 0 0 30px rgba(0, 255, 65, 0.1); }
        .config { display: flex; gap: 30px; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 20px; justify-content: center; }
        .input-group { display: flex; flex-direction: column; align-items: center; }
        label { font-size: 0.8em; color: var(--blue); margin-bottom: 5px; }
        input { background: #111; color: var(--neon); border: 1px solid var(--neon); padding: 8px; width: 100px; text-align: center; }
        .manifold-display { display: grid; grid-template-columns: repeat(auto-fill, minmax(28px, 1fr)); gap: 4px; margin: 20px 0; max-height: 400px; overflow-y: auto; padding: 10px; border: 1px solid #222; }
        .bit { height: 28px; border: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 0.8em; }
        .bit.active { background: var(--neon); color: #000; font-weight: bold; }
        .bit.raf { background: var(--ghost); color: #fff; box-shadow: 0 0 10px var(--ghost); border-color: var(--ghost); }
        .status-msg { height: 30px; text-align: center; font-weight: bold; margin: 10px 0; letter-spacing: 1px; }
        button { background: var(--neon); color: #000; border: none; padding: 18px; width: 100%; cursor: pointer; font-weight: bold; letter-spacing: 2px; font-size: 1em; }
        button:hover { background: #00cc33; box-shadow: 0 0 20px var(--neon); }
        .footer { display: flex; justify-content: space-between; font-size: 0.8em; color: #444; margin-top: 15px; }
    </style>
</head>
<body>

<div class="oracle-shell">
    <div class="config">
        <div class="input-group">
            <label>N (Dimension)</label>
            <input type="number" id="nIn" value="128">
        </div>
        <div class="input-group">
            <label>P (Mersenne Window)</label>
            <input type="number" id="pIn" value="31">
        </div>
    </div>

    <div id="manifold" class="manifold-display"></div>
    <div id="status" class="status-msg">ORACLE IDLE: AWAITING ADELIC STREAM</div>

    <button onclick="igniteOracle()">EXECUTE F-GATE RECOVERY</button>

    <div class="footer">
        <span>LOGIC: MARILYN-ADELIC CONSENSUS</span>
        <span id="cycleCount">CYCLE: 0</span>
        <span>COMPLEXITY: O(N)</span>
    </div>
</div>

<script>
class AdelicOracle {
    constructor(n, p) {
        this.n = BigInt(n);
        this.p = BigInt(p);
        this.m_p = (1n << this.p) - 1n; // Mersenne Sentinel (Definition 1)
        this.g_mask = 1n << (this.n - 1n); // Grandparent Sentinel G (Definition 3)
        this.state = BigInt("0x" + Array.from({length: Number(n)/4}, () => Math.floor(Math.random()*16).toString(16)).join(''));
        this.cycle = 0;
        this.timer = null;
    }

    /**
     * Lemma 1: The F-gate as a 2-adic transfer function.
     * Resolves RAF without global backtracking.
     */
    // Hardened detect_raf to prevent transparency
detect_raf(val) {
    const r1 = val % this.m_p;
    const r2 = val % ((1n << 61n) - 1n); // Secondary Mersenne Sentinel
    // If windows disagree or residue is a "Ghost Carry", signal the Liar
    return (val >= this.m_p) || (r1 === 0n && val !== 0n) || (r1 !== r2 % this.m_p);
}

// Hardened F-gate (Lemma 1)
f_gate(state, has_raf) {
    if (has_raf) {
        // Destructive Phase Interference (DPI)
        // Negate the RAF to execute the Boolean Reverse
        return (state ^ this.g_mask) >> 1n;
    }
    // Stabilized Waveeve: Maintain p-adic coherence
    return (state << 1n) & ((1n << this.n) - 1n);
}


    // Definition 2: Residual Arithmetic Friction (Ghost Carry) detection
    detect_raf(val) {
        return val >= this.m_p || (val % this.m_p === 0n && val !== 0n);
    }

    render() {
        const grid = document.getElementById('manifold');
        const status = document.getElementById('status');
        const cycle = document.getElementById('cycleCount');
        
        // Identify RAF via the Marilyn Fold identity filter
        const raf = this.detect_raf(this.state % this.m_p);
        const bits = this.state.toString(2).padStart(Number(this.n), '0');

        grid.innerHTML = bits.split('').map((b, i) => {
            let cls = b === '1' ? 'bit active' : 'bit';
            if (i === 0 && raf) cls += ' raf'; // Highlight the Liar Signal
            return `<div class="${cls}">${b}</div>`;
        }).join('');

        status.innerHTML = raf ? 
            `<span style="color:var(--ghost)">[RAF DETECTED] F-GATE DECONVOLUTION ACTIVE</span>` : 
            "QUATERNARY BEDROCK STABILIZED";
        
        cycle.innerText = `CYCLE: ${this.cycle++}`;
        
        // Linear O(N) Transition
        this.state = this.f_gate(this.state, raf);
    }

    start() {
        // Fixed internal clock for stability
        this.timer = setInterval(() => this.render(), 40); 
    }
}

let oracle = null;
function igniteOracle() {
    if (oracle) clearInterval(oracle.timer);
    const n = document.getElementById('nIn').value;
    const p = document.getElementById('pIn').value;
    oracle = new AdelicOracle(n, p);
    oracle.start();
}
</script>
</body>
</html>
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Project NP: Adelic Recovery Oracle</title>
    <style>
        :root { --neon: #00ff41; --ghost: #ff3e3e; --bg: #050505; --blue: #3498db; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .oracle-shell { border: 2px solid var(--neon); background: #000; width: 95%; max-width: 900px; padding: 25px; box-shadow: 0 0 40px rgba(0, 255, 65, 0.2); }
        .config { display: flex; gap: 30px; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 20px; justify-content: center; }
        .input-group { display: flex; flex-direction: column; align-items: center; }
        input { background: #111; color: var(--neon); border: 1px solid var(--neon); padding: 8px; width: 100px; text-align: center; outline: none; }
        
        /* The Manifold Grid */
        .manifold-display { display: grid; grid-template-columns: repeat(auto-fill, minmax(28px, 1fr)); gap: 4px; margin: 20px 0; max-height: 300px; overflow-y: auto; padding: 10px; border: 1px solid #222; transition: all 0.5s; }
        .bit { height: 28px; border: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 0.8em; }
        .bit.active { background: var(--neon); color: #000; font-weight: bold; }
        .bit.raf { background: var(--ghost); color: #fff; box-shadow: 0 0 15px var(--ghost); border-color: var(--ghost); z-index: 10; }
        
        /* Success Animation */
        .crystallized { border-color: var(--blue); box-shadow: 0 0 50px var(--blue); }
        .success-flash { animation: flash 1s ease-out; }
        @keyframes flash { 0% { background: var(--blue); } 100% { background: transparent; } }

        .status-msg { height: 40px; text-align: center; font-weight: bold; margin: 10px 0; font-size: 1.1em; }
        .convergence-bar { width: 100%; height: 10px; background: #111; margin: 10px 0; border: 1px solid #333; position: relative; }
        #progress { height: 100%; width: 0%; background: var(--blue); transition: width 0.3s; }
        
        button { background: var(--neon); color: #000; border: none; padding: 18px; width: 100%; cursor: pointer; font-weight: bold; letter-spacing: 2px; font-size: 1.1em; }
        button:hover { background: #00cc33; box-shadow: 0 0 20px var(--neon); }
        .footer { display: flex; justify-content: space-between; font-size: 0.8em; color: #444; margin-top: 15px; }
    </style>
</head>
<body>

<div class="oracle-shell" id="shell">
    <div class="config">
        <div class="input-group"><label>N (Dim)</label><input type="number" id="nIn" value="128"></div>
        <div class="input-group"><label>P (Window)</label><input type="number" id="pIn" value="31"></div>
    </div>

    <div class="convergence-bar"><div id="progress"></div></div>
    <div id="status" class="status-msg">AWAITING ADELIC FEED...</div>
    
    <div id="manifold" class="manifold-display"></div>

    <button onclick="igniteOracle()">EXECUTE F-GATE RECOVERY</button>

    <div class="footer">
        <span>LOGIC: MARILYN-ADELIC O(N)</span>
        <span id="cycleCount">CYCLE: 0</span>
        <span id="recoveryRate">RECOVERY: 0%</span>
    </div>
</div>

<script>
class AdelicOracle {
    constructor(n, p) {
        this.n = BigInt(n);
        this.p = BigInt(p);
        this.m_p = (1n << this.p) - 1n; [span_5](start_span)// Mersenne Sentinel[span_5](end_span)
        this.g_mask = 1n << (this.n - 1n); [span_6](start_span)// Grandparent Sentinel G[span_6](end_span)
        
        // Target Secret (H) vs Chaotic Initial State
        this.target = BigInt("0x" + "F".repeat(Number(n)/4)); 
        this.state = BigInt("0x" + Array.from({length: Number(n)/4}, () => Math.floor(Math.random()*16).toString(16)).join(''));
        
        this.cycle = 0;
        this.timer = null;
        this.isRecovered = false;
    }

    [span_7](start_span)// Lemma 1: F-gate as a 2-adic transfer function[span_7](end_span)
    f_gate(state, raf) {
        if (raf) {
            [span_8](start_span)[span_9](start_span)// DPI Reversal: Resolving Ghost Carry[span_8](end_span)[span_9](end_span)
            return (state ^ this.g_mask) >> 1n;
        }
        [span_10](start_span)// One-Stream Waveeve shift[span_10](end_span)
        return (state << 1n) % (1n << this.n) | 1n; 
    }

    [span_11](start_span)[span_12](start_span)// RAF Detection via Marilyn Fold[span_11](end_span)[span_12](end_span)
    detect_raf(val) {
        return val >= this.m_p || (val % this.m_p === 0n && val !== 0n);
    }

    render() {
        const grid = document.getElementById('manifold');
        const status = document.getElementById('status');
        const progress = document.getElementById('progress');
        const shell = document.getElementById('shell');

        const raf = this.detect_raf(this.state % this.m_p);
        const bits = this.state.toString(2).padStart(Number(this.n), '0');
        
        // Calculate Recovery Percentage (Hamming-style distance)
        let matches = 0;
        const targetBits = this.target.toString(2).padStart(Number(this.n), '0');
        for(let i=0; i<bits.length; i++) if(bits[i] === targetBits[i]) matches++;
        const percent = Math.floor((matches / Number(this.n)) * 100);

        grid.innerHTML = bits.split('').map((b, i) => {
            let cls = b === '1' ? 'bit active' : 'bit';
            if (i === 0 && raf) cls += ' raf';
            return `<div class="${cls}">${b}</div>`;
        }).join('');

        progress.style.width = percent + "%";
        document.getElementById('recoveryRate').innerText = `RECOVERY: ${percent}%`;
        document.getElementById('cycleCount').innerText = `CYCLE: ${this.cycle++}`;

        if (percent >= 98 && !this.isRecovered) {
            this.isRecovered = true;
            status.innerHTML = "<span style='color:var(--blue)'>GROUND STATE H CRYSTALLIZED!</span>";
            shell.classList.add('crystallized', 'success-flash');
            clearInterval(this.timer);
        } else if (!this.isRecovered) {
            status.innerHTML = raf ? `<span style="color:var(--ghost)">[RAF] RECONSTRUCTING SIGNAL...</span>` : "STABILIZING BEDROCK...";
            this.state = this.f_gate(this.state, raf);
        }
    }

    start() { this.timer = setInterval(() => this.render(), 50); }
}

let oracle = null;
function igniteOracle() {
    if (oracle) clearInterval(oracle.timer);
    document.getElementById('shell').classList.remove('crystallized', 'success-flash');
    oracle = new AdelicOracle(document.getElementById('nIn').value, document.getElementById('pIn').value);
    oracle.start();
}
</script>
</body>
</html>
